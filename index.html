<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>日程提醒</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2E54A1">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        :root {
            --base-font-size: 14px;
            --header-height: 50px;
            --time-bar-height: 36px;
        }
        @media (max-width: 400px) {
            :root { --base-font-size: 12px; }
            .time-row input { font-size: 12px !important; }
            .time-row span { font-size: 11px !important; }
        }
        @media (min-width: 401px) and (max-width: 600px) {
            :root { --base-font-size: 13px; }
        }
        @media (min-width: 601px) {
            :root { --base-font-size: 14px; }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Microsoft YaHei', sans-serif; }
        body {
            background: #f5f5f5; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            font-size: var(--base-font-size); -webkit-overflow-scrolling: touch;
        }
        .header {
            background: #2E54A1; color: #FFF2BD; padding: 0 12px;
            display: flex; align-items: center; justify-content: space-between;
            height: var(--header-height); flex-shrink: 0;
        }
        .header .title {
            font-size: 1.4em; display: flex; align-items: center; gap: 6px;
            flex-shrink: 0; max-width: calc(100% - 100px);
        }
        .header .btn-row {
            display: flex; gap: 0.5ch; flex-shrink: 0;
        }
        .header button {
            background: #FFF2BD; border: none; width: 36px; height: 36px; border-radius: 10px;
            font-weight: bold; cursor: pointer; font-size: 1.1em; display: flex; align-items: center; justify-content: center;
        }
        .current-time {
            background: #e9ecef; padding: 0 15px; font-size: 0.85em; text-align: center;
            border-bottom: 1px solid #ccc; height: var(--time-bar-height); line-height: var(--time-bar-height);
            position: relative; flex-shrink: 0;
        }
        .watermark {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            color: rgba(0,0,0,0.08); font-size: 0.75em; pointer-events: none;
        }
        .table-container {
            flex: 1; overflow-y: auto; padding: 8px 8px 70px 8px;
            -webkit-overflow-scrolling: touch; overscroll-behavior: contain; touch-action: pan-y;
            position: relative;
        }
        .pull-to-refresh {
            position: absolute; top: -60px; left: 0; right: 0; height: 60px;
            display: flex; align-items: center; justify-content: center;
            background: #f0f0f0; color: #666; font-size: 14px; z-index: 10;
            transition: top 0.3s; pointer-events: none;
        }
        .pull-to-refresh.active { top: 0; }

        table {
            width: 100%; table-layout: fixed; border-collapse: collapse;
            background: white; font-size: var(--base-font-size);
        }
        th {
            background: #2E54A1; color: #FFF2BD; padding: 8px 4px;
            position: sticky; top: 0; z-index: 3; text-align: center;
        }
        td {
            padding: 6px 4px; border-bottom: 1px solid #ddd; text-align: center;
            vertical-align: middle;
        }
        th:nth-child(1) { width: 5em; }
        th:nth-child(2) { width: 3em; }
        th:nth-child(3) { width: 3em; }
        th:nth-child(4) { width: 10ch; }
        th:nth-child(5) { width: 3.5em; }
        th:nth-child(6) { width: 3em; }

        .date-separator td {
            background: #D9ECFF; text-align: left; padding: 8px 4px;
        }
        .date-text {
            background: #2E54A1; color: #FFF2BD; padding: 4px 8px;
            border-radius: 4px; display: inline-block; font-weight: bold;
        }
        .row-completed td { color: #8eb47e; }
        .row-urgent td { color: #d04040; }

        .deadline-cell {
            display: flex; flex-direction: column; align-items: center;
        }
        .status-text {
            font-size: 0.9em; margin-top: 6px; font-weight: bold;
        }
        .countdown-cell {
            display: flex; flex-direction: column; align-items: center;
            line-height: 1.4;
        }
        .btn-group {
            display: flex; flex-direction: column; gap: 3px; align-items: center;
        }
        .btn-group button {
            padding: 3px 6px; font-size: 0.75em; border: none;
            border-radius: 4px; background: #e0e0e0; cursor: pointer; width: 100%;
        }
        .btn-group .btn-danger { background: #ffcccc; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: white; padding: 20px; border-radius: 12px; width: 90%;
            max-width: 420px; max-height: 85vh; overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 15px; color: #2E54A1; }
        .modal-content input[type="text"], .modal-content input[type="number"], .modal-content textarea {
            width: 100%; padding: 8px; margin: 6px 0; border: 1px solid #ccc;
            border-radius: 6px; font-size: 1em;
        }
        .time-row {
            display: flex; align-items: center; gap: 3px; flex-wrap: nowrap;
        }
        .time-row input { text-align: center; padding: 6px 2px; }
        .time-row .year { width: 5em; }
        .time-row .small { width: 3.5em; }
        .time-row span { font-size: 0.85em; white-space: nowrap; }
        .quick-btns { display: flex; flex-wrap: wrap; gap: 4px; margin: 10px 0; }
        .quick-btns button {
            background: #e0e0e0; color: black; padding: 6px 8px;
            font-size: 0.9em; border: none; border-radius: 6px; cursor: pointer;
            flex: 1 1 auto; min-width: 70px; text-align: center;
        }
        .quick-btns .break { flex-basis: 100%; height: 0; }

        .action-btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
        .action-btns button {
            padding: 8px 16px; font-size: 1em; border: none; border-radius: 6px;
            cursor: pointer; font-weight: bold;
        }
        .btn-primary { background: #2E54A1; color: #FFF2BD; }
        .btn-cancel { background: #ccc; color: #333; }

        .status-options { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
        .status-options button {
            padding: 10px; font-size: 1em; border: none; border-radius: 6px;
            background: #f0f0f0; cursor: pointer;
        }
        .toggle-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
        .switch { position: relative; width: 48px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #2E54A1; }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">📅 日程提醒</div>
        <div class="btn-row">
            <button onclick="openSettings()" title="邮件设置">📧⚙️</button>
            <button onclick="openAddModal()" title="添加日程">➕</button>
        </div>
    </div>
    <div class="current-time" id="currentTime">
        加载中…
        <span class="watermark">DESIGNED BY CDH</span>
    </div>
    <div class="table-container" id="tableContainer">
        <div class="pull-to-refresh" id="pullToRefresh">↓ 下拉刷新</div>
        <table id="scheduleTable">
            <thead>
                <tr><th>事项</th><th>负责人</th><th>落实人</th><th>截止时间</th><th>倒计时</th><th>操作</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <!-- 添加/修改模态框 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3 id="modalTitle">添加日程</h3>
            <input type="text" id="thing" placeholder="事项">
            <input type="text" id="responsible" placeholder="负责人">
            <input type="text" id="implementer" placeholder="落实人">
            <div class="time-row">
                <input type="number" id="year" class="year" placeholder="年"><span>年</span>
                <input type="number" id="month" class="small" placeholder="月"><span>月</span>
                <input type="number" id="day" class="small" placeholder="日"><span>日</span>
                <input type="number" id="hour" class="small" placeholder="时"><span>时</span>
                <input type="number" id="minute" class="small" placeholder="分"><span>分</span>
            </div>
            <div class="quick-btns">
                <button onclick="quickAdd(15*60)">15分钟后</button>
                <button onclick="quickAdd(60*60)">1小时后</button>
                <button onclick="quickAdd(6*3600)">6小时后</button>
                <div class="break"></div>
                <button onclick="quickAdd(24*3600)">1天后</button>
                <button onclick="quickAdd(7*24*3600)">1星期后</button>
                <button onclick="setNowTime()">当前时间</button>
            </div>
            <div id="errorMsg" style="color: red; font-size: 0.9em; min-height: 20px;"></div>
            <div class="action-btns">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-primary" onclick="saveSchedule()">确定</button>
            </div>
        </div>
    </div>

    <!-- 状态选择模态框 -->
    <div class="modal" id="statusModal">
        <div class="modal-content">
            <h3>选择状态</h3>
            <div class="status-options" id="statusOptions"></div>
            <div class="action-btns" style="justify-content: center;">
                <button class="btn-cancel" onclick="closeStatusModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- 提醒弹窗 -->
    <div class="modal" id="alertModal">
        <div class="modal-content" style="text-align: center;">
            <h3>⏰ 日程提醒</h3>
            <p id="alertMsg" style="margin: 15px 0; font-size: 1.1em;"></p>
            <div class="action-btns" style="justify-content: center;">
                <button class="btn-primary" onclick="alertComplete()">已完成</button>
                <button class="btn-cancel" onclick="alertPostpone()">延期提醒</button>
            </div>
        </div>
    </div>

    <!-- 确认完成模态框 -->
    <div class="modal" id="confirmModal">
        <div class="modal-content" style="text-align: center;">
            <p style="font-size: 1.2em;">确认标记为“已完成”？</p>
            <div class="action-btns" style="justify-content: center;">
                <button class="btn-cancel" onclick="closeConfirmModal()">取消</button>
                <button class="btn-primary" onclick="confirmComplete()">确认完成</button>
            </div>
        </div>
    </div>

    <!-- 时间早于当前确认弹窗 -->
    <div class="modal" id="pastTimeModal">
        <div class="modal-content" style="text-align: center;">
            <p style="font-size: 1.1em;">确认要设置该时间吗？<br>该时间早于当前时间</p>
            <div class="action-btns" style="justify-content: center;">
                <button class="btn-cancel" onclick="closePastTimeModal()">取消</button>
                <button class="btn-primary" onclick="confirmPastTime()">确认</button>
            </div>
        </div>
    </div>

    <!-- 设置模态框 -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h3>⚙️ 设置</h3>
            <div class="toggle-row">
                <span>启用邮件通知</span>
                <label class="switch">
                    <input type="checkbox" id="emailEnabled">
                    <span class="slider"></span>
                </label>
            </div>
            <p style="font-size:0.8em; color:#666;">需配置EmailJS</p>
            <input type="text" id="emailPublicKey" placeholder="EmailJS Public Key">
            <input type="text" id="emailServiceId" placeholder="Service ID">
            <input type="text" id="emailTemplateId" placeholder="Template ID">
            <input type="text" id="emailTo" placeholder="收件邮箱 (如 your@qq.com)">
            <div class="action-btns">
                <button class="btn-primary" onclick="confirmSettings()">确认</button>
            </div>
        </div>
    </div>

    <script>
        emailjs.init('');

        // ---------- 数据存储 ----------
        const STORAGE_KEY = 'schedules_data';
        const NOTIFIED_KEY = 'notified_schedule_ids';
        const EMAIL_REMINDER_KEY = 'email_reminders_sent';
        const EMAIL_SETTINGS_KEY = 'email_settings';
        let schedules = [];
        let editingId = null;
        let alertingId = null;
        let currentStatusScheduleId = null;
        let pendingCompleteId = null;
        let notifiedSet = new Set();
        let emailReminders = {};
        let emailSettings = { enabled: false, publicKey: '', serviceId: '', templateId: '', to: '' };
        let pastTimePending = null;
        let autoScrollTimer = null;

        // 持久化加载
        function loadEmailReminders() {
            const raw = localStorage.getItem(EMAIL_REMINDER_KEY);
            emailReminders = raw ? JSON.parse(raw) : {};
        }
        function saveEmailReminders() {
            localStorage.setItem(EMAIL_REMINDER_KEY, JSON.stringify(emailReminders));
        }
        function loadNotifiedSet() {
            const raw = localStorage.getItem(NOTIFIED_KEY);
            notifiedSet = raw ? new Set(JSON.parse(raw)) : new Set();
        }
        function saveNotifiedSet() {
            localStorage.setItem(NOTIFIED_KEY, JSON.stringify([...notifiedSet]));
        }
        function loadData() {
            const raw = localStorage.getItem(STORAGE_KEY);
            schedules = raw ? JSON.parse(raw) : [];
        }
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(schedules));
        }
        function loadEmailSettings() {
            const raw = localStorage.getItem(EMAIL_SETTINGS_KEY);
            if (raw) {
                emailSettings = JSON.parse(raw);
                document.getElementById('emailEnabled').checked = emailSettings.enabled;
                document.getElementById('emailPublicKey').value = emailSettings.publicKey || '';
                document.getElementById('emailServiceId').value = emailSettings.serviceId || '';
                document.getElementById('emailTemplateId').value = emailSettings.templateId || '';
                document.getElementById('emailTo').value = emailSettings.to || '';
                if (emailSettings.publicKey) emailjs.init(emailSettings.publicKey);
            }
        }
        function saveEmailSettingsToStorage() {
            emailSettings.enabled = document.getElementById('emailEnabled').checked;
            emailSettings.publicKey = document.getElementById('emailPublicKey').value.trim();
            emailSettings.serviceId = document.getElementById('emailServiceId').value.trim();
            emailSettings.templateId = document.getElementById('emailTemplateId').value.trim();
            emailSettings.to = document.getElementById('emailTo').value.trim();
            localStorage.setItem(EMAIL_SETTINGS_KEY, JSON.stringify(emailSettings));
            if (emailSettings.publicKey) emailjs.init(emailSettings.publicKey);
        }

        function canSendEmail() {
            return emailSettings.enabled && emailSettings.publicKey && emailSettings.serviceId && emailSettings.templateId && emailSettings.to;
        }

        function sendReminderEmail(schedule, remainingText) {
            if (!canSendEmail()) return;
            emailjs.send(emailSettings.serviceId, emailSettings.templateId, {
                to_email: emailSettings.to,
                thing: schedule.thing,
                responsible: schedule.responsible || '无',
                implementer: schedule.implementer || '无',
                deadline: schedule.deadline,
                status: '提醒',
                time: new Date().toLocaleString(),
                subject: `提醒事项 剩余 ${remainingText}`
            }).catch(err => console.warn('邮件发送失败:', err));
        }

        // ---------- 工具函数 ----------
        function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }
        function getNow() { return new Date(); }
        function formatDateTime(date) {
            return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}:00`;
        }
        function getWeekdayCN(dateStr) {
            const days = ['日','一','二','三','四','五','六'];
            return '星期' + days[new Date(dateStr).getDay()];
        }
        function calcCountdownParts(deadlineStr, now) {
            const dl = new Date(deadlineStr);
            const diff = dl - now;
            if (diff <= 0) return null;
            const totalSec = Math.floor(diff / 1000);
            const days = Math.floor(totalSec / 86400);
            const hours = Math.floor((totalSec % 86400) / 3600);
            const mins = Math.floor((totalSec % 3600) / 60);
            const secs = totalSec % 60;
            return { days, hours, mins, secs, totalSec };
        }
        function resetEmailRemindersForSchedule(id) {
            delete emailReminders[id];
            saveEmailReminders();
        }

        // ---------- 邮件提醒检查 ----------
        function checkEmailReminders(schedule, now) {
            if (!canSendEmail() || schedule.completed) return;
            const deadline = new Date(schedule.deadline);
            const diffSec = Math.floor((deadline - now) / 1000);
            if (diffSec <= 0) return;
            const id = schedule.id;
            if (!emailReminders[id]) emailReminders[id] = [];
            const points = [];
            if (diffSec > 3600) { points.push(6 * 3600); points.push(3600); }
            else if (diffSec > 0) { points.push(Math.floor(diffSec / 2)); }
            for (const p of points) {
                const key = `${p}s`;
                if (!emailReminders[id].includes(key) && diffSec <= p + 60 && diffSec >= p - 60) {
                    emailReminders[id].push(key); saveEmailReminders();
                    const parts = calcCountdownParts(schedule.deadline, now);
                    if (parts) {
                        let remain = '';
                        if (parts.days > 0) remain += `${parts.days}天`;
                        if (parts.hours > 0 || parts.days > 0) remain += `${parts.hours}时`;
                        remain += `${parts.mins}分`;
                        sendReminderEmail(schedule, remain);
                    }
                }
            }
        }

        // ---------- 系统通知 ----------
        function requestNotificationPermission() {
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }
        function showSystemNotification(schedule) {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification('⏰ 日程提醒', { body: schedule.thing, tag: schedule.id });
            }
        }
        function checkAndNotifyExpired(schedule, now) {
            if (!schedule.completed && new Date(schedule.deadline) <= now && !notifiedSet.has(schedule.id)) {
                notifiedSet.add(schedule.id); saveNotifiedSet();
                showSystemNotification(schedule);
                if (document.visibilityState === 'visible') {
                    alertingId = schedule.id;
                    document.getElementById('alertMsg').innerHTML = `<strong>事项：</strong>${schedule.thing}<br>时间已到`;
                    document.getElementById('alertModal').style.display = 'flex';
                }
            }
        }

        // ---------- 自动滚动 ----------
        function resetAutoScroll() {
            if (autoScrollTimer) clearTimeout(autoScrollTimer);
            autoScrollTimer = setTimeout(() => {
                scrollToToday();
            }, 10000);
        }
        function scrollToToday() {
            if (!schedules.length) return;
            const now = getNow();
            const todayStr = now.toISOString().slice(0,10);
            const first = schedules.find(s => !s.completed && s.deadline.slice(0,10) >= todayStr) || schedules[0];
            const rows = document.querySelectorAll('#tableBody tr');
            for (const row of rows) {
                if (row.cells[0]?.textContent === first.thing) {
                    row.scrollIntoView({ block: 'center' });
                    break;
                }
            }
        }

        // ---------- 渲染表格 ----------
        function renderTable() {
            const now = getNow();
            document.getElementById('currentTime').innerHTML = `当前时间：${now.toLocaleString()} <span class="watermark">DESIGNED BY CDH</span>`;
            schedules.sort((a,b) => (a.deadline||'').localeCompare(b.deadline||''));
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            let lastDate = '';

            for (const s of schedules) {
                const deadline = s.deadline || '';
                const datePart = deadline.slice(0,10);
                if (datePart && datePart !== lastDate) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td colspan="6" class="date-separator"><span class="date-text">${datePart} ${getWeekdayCN(datePart)}</span></td>`;
                    tbody.appendChild(tr);
                }
                lastDate = datePart;

                const isCompleted = s.completed || false;
                let rowClass = '', statusHtml = '', countdownHtml = '';

                if (isCompleted) {
                    rowClass = 'row-completed';
                    statusHtml = '<span class="status-text" style="color:#8eb47e;">已完成</span>';
                    countdownHtml = s.completed_countdown || '';
                } else if (deadline) {
                    const dl = new Date(deadline);
                    const diffMs = dl - now;
                    if (diffMs <= 0) {
                        rowClass = 'row-completed';
                        statusHtml = '<span class="status-text" style="color:#8eb47e;">已完成</span>';
                        countdownHtml = '计时结束';
                        checkAndNotifyExpired(s, now);
                    } else {
                        const diffHours = diffMs / 3600000;
                        let statusColor, statusText;
                        if (diffHours <= 1) { statusColor = '#d04040'; statusText = '时间快到了'; }
                        else if (diffHours <= 3) { statusColor = 'orange'; statusText = '加油干！'; }
                        else { statusColor = '#333'; statusText = '进行中'; }
                        statusHtml = `<span class="status-text" style="color:${statusColor}; font-weight:bold;">${statusText}</span>`;
                        const parts = calcCountdownParts(deadline, now);
                        if (parts) {
                            const seg = [];
                            if (parts.days > 0) seg.push(`${parts.days}天`);
                            if (parts.hours > 0 || parts.days > 0) seg.push(`${String(parts.hours).padStart(2,'0')}时`);
                            if (parts.mins > 0 || parts.hours > 0 || parts.days > 0) seg.push(`${String(parts.mins).padStart(2,'0')}分`);
                            seg.push(`${String(parts.secs).padStart(2,'0')}秒`);
                            countdownHtml = seg.join('<br>');
                        }
                        rowClass = diffHours <= 3 ? 'row-urgent' : '';
                        checkEmailReminders(s, now);
                    }
                }

                const tr = document.createElement('tr');
                tr.className = rowClass;
                tr.innerHTML = `
                    <td>${s.thing||''}</td>
                    <td>${s.responsible||''}</td>
                    <td>${s.implementer||''}</td>
                    <td><div class="deadline-cell"><span>${deadline.slice(0,10)}</span><span>${deadline.slice(11)}</span>${statusHtml}</div></td>
                    <td><div class="countdown-cell">${countdownHtml}</div></td>
                    <td><div class="btn-group">
                        <button onclick="openEditModal('${s.id}')">修改</button>
                        <button onclick="openStatusModal('${s.id}')">状态</button>
                        <button class="btn-danger" onclick="deleteSchedule('${s.id}')">删除</button>
                    </div></td>
                `;
                tbody.appendChild(tr);
            }
            resetAutoScroll();
        }

        // ---------- 状态模态框 ----------
        function openStatusModal(id) {
            currentStatusScheduleId = id;
            const s = schedules.find(i => i.id === id);
            if (!s) return;
            const div = document.getElementById('statusOptions');
            div.innerHTML = '';
            if (s.completed) {
                const doneBtn = document.createElement('button');
                doneBtn.textContent = '已完成';
                doneBtn.disabled = true;
                doneBtn.style.background = '#ccc';
                div.appendChild(doneBtn);
                const postponeBtn = document.createElement('button');
                postponeBtn.textContent = '延期提醒';
                postponeBtn.onclick = () => { closeStatusModal(); openEditModal(id); };
                div.appendChild(postponeBtn);
            } else {
                const completeBtn = document.createElement('button');
                completeBtn.textContent = '已完成';
                completeBtn.onclick = () => { closeStatusModal(); openConfirmModal(id); };
                div.appendChild(completeBtn);
                const urgentBtn = document.createElement('button');
                urgentBtn.textContent = '加油干！';
                urgentBtn.onclick = () => {
                    const sch = schedules.find(i => i.id === id);
                    if (sch) { sch.completed = false; notifiedSet.delete(id); saveNotifiedSet(); saveData(); }
                    closeStatusModal();
                };
                div.appendChild(urgentBtn);
                const progressBtn = document.createElement('button');
                progressBtn.textContent = '进行中';
                progressBtn.onclick = () => {
                    const sch = schedules.find(i => i.id === id);
                    if (sch) { sch.completed = false; notifiedSet.delete(id); saveNotifiedSet(); saveData(); }
                    closeStatusModal();
                };
                div.appendChild(progressBtn);
            }
            document.getElementById('statusModal').style.display = 'flex';
        }
        function closeStatusModal() { document.getElementById('statusModal').style.display = 'none'; }

        function openConfirmModal(id) { pendingCompleteId = id; document.getElementById('confirmModal').style.display = 'flex'; }
        function closeConfirmModal() { pendingCompleteId = null; document.getElementById('confirmModal').style.display = 'none'; }
        function confirmComplete() {
            if (pendingCompleteId) {
                const s = schedules.find(i => i.id === pendingCompleteId);
                if (s) { s.completed = true; s.completed_countdown = ''; notifiedSet.delete(pendingCompleteId); saveNotifiedSet(); saveData(); resetEmailRemindersForSchedule(pendingCompleteId); }
            }
            closeConfirmModal();
        }

        function alertComplete() {
            if (alertingId) { const s = schedules.find(i => i.id === alertingId); if (s) { s.completed = true; saveData(); resetEmailRemindersForSchedule(alertingId); } }
            document.getElementById('alertModal').style.display = 'none';
            alertingId = null;
        }
        function alertPostpone() {
            if (alertingId) { document.getElementById('alertModal').style.display = 'none'; openEditModal(alertingId); alertingId = null; }
        }

        // ---------- 添加/修改 ----------
        function openAddModal() {
            editingId = null; document.getElementById('modalTitle').textContent = '添加日程';
            document.getElementById('thing').value = ''; document.getElementById('responsible').value = ''; document.getElementById('implementer').value = '';
            setNowTime(); document.getElementById('errorMsg').textContent = ''; document.getElementById('editModal').style.display = 'flex';
        }
        function openEditModal(id) {
            const s = schedules.find(i => i.id === id); if (!s) return;
            editingId = id; document.getElementById('modalTitle').textContent = '修改截止时间';
            document.getElementById('thing').value = s.thing || ''; document.getElementById('responsible').value = s.responsible || ''; document.getElementById('implementer').value = s.implementer || '';
            const dt = new Date(s.deadline);
            document.getElementById('year').value = dt.getFullYear(); document.getElementById('month').value = String(dt.getMonth()+1).padStart(2,'0');
            document.getElementById('day').value = String(dt.getDate()).padStart(2,'0'); document.getElementById('hour').value = String(dt.getHours()).padStart(2,'0');
            document.getElementById('minute').value = String(dt.getMinutes()).padStart(2,'0');
            document.getElementById('errorMsg').textContent = ''; document.getElementById('editModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        function setNowTime() {
            const now = getNow();
            document.getElementById('year').value = now.getFullYear(); document.getElementById('month').value = String(now.getMonth()+1).padStart(2,'0');
            document.getElementById('day').value = String(now.getDate()).padStart(2,'0'); document.getElementById('hour').value = String(now.getHours()).padStart(2,'0');
            document.getElementById('minute').value = String(now.getMinutes()).padStart(2,'0');
        }
        function quickAdd(seconds) {
            const y=parseInt(document.getElementById('year').value), mo=parseInt(document.getElementById('month').value),
                  d=parseInt(document.getElementById('day').value), h=parseInt(document.getElementById('hour').value),
                  mi=parseInt(document.getElementById('minute').value);
            if (isNaN(y)||isNaN(mo)||isNaN(d)||isNaN(h)||isNaN(mi)) return;
            const dt = new Date(y,mo-1,d,h,mi); dt.setTime(dt.getTime() + seconds*1000);
            document.getElementById('year').value = dt.getFullYear(); document.getElementById('month').value = String(dt.getMonth()+1).padStart(2,'0');
            document.getElementById('day').value = String(dt.getDate()).padStart(2,'0'); document.getElementById('hour').value = String(dt.getHours()).padStart(2,'0');
            document.getElementById('minute').value = String(dt.getMinutes()).padStart(2,'0');
        }
        function saveSchedule() {
            const thing = document.getElementById('thing').value.trim();
            const resp = document.getElementById('responsible').value.trim();
            const impl = document.getElementById('implementer').value.trim();
            const y=parseInt(document.getElementById('year').value), mo=parseInt(document.getElementById('month').value),
                  d=parseInt(document.getElementById('day').value), h=parseInt(document.getElementById('hour').value),
                  mi=parseInt(document.getElementById('minute').value);
            if (!thing) { document.getElementById('errorMsg').textContent='事项不能为空'; return; }
            if (isNaN(y)||isNaN(mo)||isNaN(d)||isNaN(h)||isNaN(mi)) { document.getElementById('errorMsg').textContent='日期时间必须填完整'; return; }
            const deadlineDate = new Date(y,mo-1,d,h,mi);
            if (deadlineDate <= getNow()) {
                pastTimePending = { year: y, month: mo, day: d, hour: h, minute: mi, thing, resp, impl, isEditing: editingId };
                document.getElementById('pastTimeModal').style.display = 'flex';
                return;
            }
            finalizeSchedule(thing, resp, impl, y, mo, d, h, mi);
        }
        function closePastTimeModal() { document.getElementById('pastTimeModal').style.display = 'none'; pastTimePending = null; }
        function confirmPastTime() {
            if (!pastTimePending) return;
            const { year, month, day, hour, minute, thing, resp, impl, isEditing } = pastTimePending;
            const deadlineStr = formatDateTime(new Date(year, month-1, day, hour, minute));
            if (isEditing) {
                const s = schedules.find(i => i.id === isEditing);
                if (s) { s.deadline = deadlineStr; s.completed = true; notifiedSet.delete(isEditing); saveNotifiedSet(); resetEmailRemindersForSchedule(isEditing); }
            } else {
                schedules.push({ id: generateId(), thing, responsible: resp, implementer: impl, deadline: deadlineStr, completed: true });
            }
            saveData(); closeModal();
            document.getElementById('pastTimeModal').style.display = 'none'; pastTimePending = null;
        }
        function finalizeSchedule(thing, resp, impl, y, mo, d, h, mi) {
            const deadlineStr = formatDateTime(new Date(y, mo-1, d, h, mi));
            if (editingId) {
                const s = schedules.find(i => i.id === editingId);
                if (s) { s.deadline = deadlineStr; s.completed = false; notifiedSet.delete(editingId); saveNotifiedSet(); resetEmailRemindersForSchedule(editingId); }
            } else {
                schedules.push({ id: generateId(), thing, responsible: resp, implementer: impl, deadline: deadlineStr, completed: false });
            }
            saveData(); closeModal();
        }
        function deleteSchedule(id) {
            if (confirm('确定删除此日程吗？')) {
                schedules = schedules.filter(i => i.id !== id);
                notifiedSet.delete(id); saveNotifiedSet(); resetEmailRemindersForSchedule(id); saveData();
            }
        }

        // ---------- 设置 ----------
        function openSettings() { loadEmailSettings(); document.getElementById('settingsModal').style.display = 'flex'; }
        function confirmSettings() {
            const enabled = document.getElementById('emailEnabled').checked;
            const publicKey = document.getElementById('emailPublicKey').value.trim();
            const serviceId = document.getElementById('emailServiceId').value.trim();
            const templateId = document.getElementById('emailTemplateId').value.trim();
            const to = document.getElementById('emailTo').value.trim();
            if (enabled && (!publicKey || !serviceId || !templateId || !to)) { alert('请填写完整的邮件配置，或关闭邮件开关'); return; }
            saveEmailSettingsToStorage();
            document.getElementById('settingsModal').style.display = 'none';
        }

        // ---------- 下拉刷新 ----------
        const tableContainer = document.getElementById('tableContainer');
        const pullToRefresh = document.getElementById('pullToRefresh');
        let pullStartY = 0;
        let pulling = false;
        tableContainer.addEventListener('touchstart', (e) => {
            if (tableContainer.scrollTop === 0) {
                pullStartY = e.touches[0].clientY;
                pulling = true;
            }
        });
        tableContainer.addEventListener('touchmove', (e) => {
            if (pulling) {
                const currentY = e.touches[0].clientY;
                const distance = currentY - pullStartY;
                if (distance > 30) {
                    pullToRefresh.classList.add('active');
                    pullToRefresh.textContent = '释放刷新';
                } else {
                    pullToRefresh.classList.remove('active');
                    pullToRefresh.textContent = '↓ 下拉刷新';
                }
            }
        });
        tableContainer.addEventListener('touchend', () => {
            if (pulling && pullToRefresh.classList.contains('active')) {
                loadData();
                renderTable();
                pullToRefresh.textContent = '刷新中...';
                setTimeout(() => {
                    pullToRefresh.classList.remove('active');
                    pullToRefresh.textContent = '↓ 下拉刷新';
                }, 500);
            }
            pulling = false;
            pullStartY = 0;
        });

        // ---------- Service Worker 自动更新 ----------
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                reg.onupdatefound = () => {
                    const newWorker = reg.installing;
                    newWorker.onstatechange = () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            if (confirm('有新版本可用，点击确定更新')) {
                                newWorker.postMessage({ action: 'skipWaiting' });
                                window.location.reload();
                            }
                        }
                    };
                };
            }).catch(err => console.log('SW注册失败', err));
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) { refreshing = true; window.location.reload(); }
            });
        }

        // ---------- 初始化 ----------
        function init() {
            loadData();
            loadNotifiedSet();
            loadEmailReminders();
            loadEmailSettings();
            requestNotificationPermission();
            renderTable();
            setInterval(renderTable, 1000);
            window.onclick = e => { if (e.target.classList.contains('modal')) e.target.style.display = 'none'; };
            document.getElementById('tableContainer').addEventListener('scroll', resetAutoScroll);
            document.getElementById('tableContainer').addEventListener('touchmove', resetAutoScroll);
            resetAutoScroll();
        }
        init();
    </script>
</body>
</html>
