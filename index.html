<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>日程提醒</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2E54A1">
    <style>
        :root {
            --base-font-size: 14px;
        }
        @media (max-width: 400px) {
            :root { --base-font-size: 12px; }
        }
        @media (min-width: 401px) and (max-width: 600px) {
            :root { --base-font-size: 13px; }
        }
        @media (min-width: 601px) {
            :root { --base-font-size: 14px; }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        body {
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-size: var(--base-font-size);
        }
        .header {
            background: #2E54A1;
            color: #FFF2BD;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h2 { font-size: 1.4em; }
        .header button {
            background: #FFF2BD;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
        }
        .current-time {
            background: #e9ecef;
            padding: 6px 15px;
            font-size: 0.9em;
            text-align: right;
            border-bottom: 1px solid #ccc;
        }
        .table-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            table-layout: fixed;
            border-collapse: collapse;
            background: white;
            font-size: var(--base-font-size);
            word-break: break-all;
        }
        th {
            background: #2E54A1;
            color: #FFF2BD;
            padding: 8px 4px;
            position: sticky;
            top: 0;
            z-index: 2;
            text-align: center;
        }
        td {
            padding: 6px 4px;
            border-bottom: 1px solid #ddd;
            text-align: center;
            vertical-align: middle;
        }

        /* 列宽 */
        th:nth-child(1) { width: 5em; }
        th:nth-child(2) { width: 3em; }
        th:nth-child(3) { width: 3em; }
        th:nth-child(4) { width: 10ch; }
        th:nth-child(5) { width: 3.5em; }
        th:nth-child(6) { width: 3em; }

        .deadline-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.4;
        }
        .deadline-date { font-weight: bold; }
        .deadline-status {
            margin-top: 0.5em;
            font-weight: bold;
        }
        .status-normal { color: black; }
        .status-urgent { color: orange; }
        .status-critical { color: red; }
        .status-completed { color: #8eb47e; }

        .countdown-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.4;
        }

        .date-separator td {
            background: #D9ECFF;
            text-align: left;
            padding: 8px 4px;
        }
        .date-text {
            background: #2E54A1;
            color: #FFF2BD;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
            align-items: center;
        }
        .btn-group button {
            padding: 3px 6px;
            font-size: 0.75em;
            border: none;
            border-radius: 4px;
            background: #e0e0e0;
            cursor: pointer;
            width: 100%;
        }
        .btn-group .btn-danger { background: #ffcccc; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 15px; color: #2E54A1; }
        .modal-content input[type="text"],
        .modal-content input[type="number"] {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
        }
        .time-row {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-wrap: wrap;
        }
        .time-row .input-group {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .time-row input { width: 55px; text-align: center; }
        .quick-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 10px 0;
        }
        .quick-btns button {
            background: #e0e0e0;
            color: black;
            padding: 6px 8px;
            font-size: 0.9em;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .action-btns {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 15px;
        }
        .action-btns button {
            padding: 8px 16px;
            font-size: 1em;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary { background: #2E54A1; color: #FFF2BD; }
        .btn-cancel { background: #ccc; color: #333; }

        .status-options {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
        }
        .status-options button {
            padding: 10px;
            font-size: 1em;
            border: none;
            border-radius: 6px;
            background: #f0f0f0;
            cursor: pointer;
        }
        .status-options button:hover { background: #e0e0e0; }

        #confirmModal .modal-content {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>📅 日程提醒</h2>
        <button onclick="openAddModal()">➕ 添加</button>
    </div>
    <div class="current-time" id="currentTime">加载中…</div>
    <div class="table-container">
        <table id="scheduleTable">
            <thead>
                <tr>
                    <th>事项</th><th>负责人</th><th>落实人</th><th>截止时间</th><th>倒计时</th><th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <!-- 添加/修改模态框 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3 id="modalTitle">添加日程</h3>
            <input type="text" id="thing" placeholder="事项">
            <input type="text" id="responsible" placeholder="负责人">
            <input type="text" id="implementer" placeholder="落实人">
            <div class="time-row">
                <div class="input-group">
                    <input type="number" id="year" placeholder="年" min="2024" max="2099">
                    <span>年</span>
                </div>
                <div class="input-group">
                    <input type="number" id="month" placeholder="月" min="1" max="12">
                    <span>月</span>
                </div>
                <div class="input-group">
                    <input type="number" id="day" placeholder="日" min="1" max="31">
                    <span>日</span>
                </div>
                <div class="input-group">
                    <input type="number" id="hour" placeholder="时" min="0" max="23">
                    <span>时</span>
                </div>
                <div class="input-group">
                    <input type="number" id="minute" placeholder="分" min="0" max="59">
                    <span>分</span>
                </div>
            </div>
            <div class="quick-btns">
                <button onclick="quickAdd(15)">15分钟后</button>
                <button onclick="quickAdd(30)">30分钟后</button>
                <button onclick="quickAdd(60)">1小时后</button>
                <button onclick="quickAdd(180)">3小时后</button>
                <button onclick="setNowTime()">当前时间</button>
            </div>
            <div id="errorMsg" style="color: red; font-size: 0.9em; min-height: 20px;"></div>
            <div class="action-btns">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-primary" onclick="saveSchedule()">确定</button>
            </div>
        </div>
    </div>

    <!-- 状态选择模态框 -->
    <div class="modal" id="statusModal">
        <div class="modal-content">
            <h3>选择状态</h3>
            <div class="status-options" id="statusOptions"></div>
            <div class="action-btns" style="justify-content: center;">
                <button class="btn-cancel" onclick="closeStatusModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- 提醒弹窗 -->
    <div class="modal" id="alertModal">
        <div class="modal-content" style="text-align: center;">
            <h3>⏰ 日程提醒</h3>
            <p id="alertMsg" style="margin: 15px 0; font-size: 1.1em; line-height: 1.6;"></p>
            <div class="action-btns" style="justify-content: center;">
                <button class="btn-primary" onclick="alertComplete()">已完成</button>
                <button class="btn-cancel" onclick="alertPostpone()">延期提醒</button>
            </div>
        </div>
    </div>

    <!-- 确认完成模态框 -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <p style="font-size: 1.2em; margin-bottom: 20px;">确认标记为“已完成”？</p>
            <div class="action-btns" style="justify-content: center;">
                <button class="btn-cancel" onclick="closeConfirmModal()">取消</button>
                <button class="btn-primary" onclick="confirmComplete()">确认完成</button>
            </div>
        </div>
    </div>

    <script>
        // ---------- 数据存储 ----------
        const STORAGE_KEY = 'schedules_data';
        const NOTIFIED_KEY = 'notified_schedule_ids';
        let schedules = [];
        let editingId = null;
        let alertingId = null;
        let currentStatusScheduleId = null;
        let pendingCompleteId = null;
        let notifiedSet = new Set();

        function loadNotifiedSet() {
            const raw = localStorage.getItem(NOTIFIED_KEY);
            notifiedSet = raw ? new Set(JSON.parse(raw)) : new Set();
        }
        function saveNotifiedSet() {
            localStorage.setItem(NOTIFIED_KEY, JSON.stringify([...notifiedSet]));
        }
        function loadData() {
            const raw = localStorage.getItem(STORAGE_KEY);
            schedules = raw ? JSON.parse(raw) : [];
        }
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(schedules));
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        // ---------- 时间工具 ----------
        function getNow() { return new Date(); }
        function formatDateTime(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            const h = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            return `${y}-${m}-${d} ${h}:${min}:00`;
        }
        function getWeekdayCN(dateStr) {
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            return '星期' + days[new Date(dateStr).getDay()];
        }
        function getRemainSeconds(deadlineStr) {
            const dl = new Date(deadlineStr);
            const now = getNow();
            return Math.floor((dl - now) / 1000);
        }

        // 返回 [days, hours, mins, secs]
        function getCountdownParts(deadlineStr) {
            let totalSec = getRemainSeconds(deadlineStr);
            if (totalSec < 0) totalSec = 0;
            const days = Math.floor(totalSec / 86400);
            const hours = Math.floor((totalSec % 86400) / 3600);
            const mins = Math.floor((totalSec % 3600) / 60);
            const secs = totalSec % 60;
            return [days, hours, mins, secs];
        }

        function getStatusInfo(schedule) {
            if (schedule.completed) {
                return { text: '已完成', class: 'status-completed' };
            }
            const totalSec = getRemainSeconds(schedule.deadline);
            if (totalSec <= 0) return { text: '已完成', class: 'status-completed' };
            const hours = totalSec / 3600;
            if (hours > 3) {
                return { text: '进行中', class: 'status-normal' };
            } else if (hours > 1) {
                return { text: '加油干！', class: 'status-urgent' };
            } else {
                return { text: '时间快到了', class: 'status-critical' };
            }
        }

        function calcCountdownDisplay(deadlineStr) {
            const [days, hours, mins, secs] = getCountdownParts(deadlineStr);
            const parts = [];
            if (days >= 3) {
                parts.push(`${days}天`, `${hours}小时`);
            } else if (days >= 1) {
                parts.push(`${days}天`, `${hours}小时`, `${mins}分钟`);
            } else {
                if (hours > 0) parts.push(`${hours}小时`);
                if (mins > 0 || hours > 0) parts.push(`${mins}分钟`);
                parts.push(`${secs}秒`);
            }
            return parts;
        }

        // ---------- 系统通知 ----------
        function requestNotificationPermission() {
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }
        function showSystemNotification(schedule) {
            if ('Notification' in window && Notification.permission === 'granted') {
                const body = `负责人：${schedule.responsible || '无'}\n落实人：${schedule.implementer || '无'}\n截止时间：${schedule.deadline}`;
                new Notification('⏰ 日程提醒', {
                    body: body,
                    icon: 'icon-192.png',
                    tag: schedule.id,
                    requireInteraction: true
                });
            }
        }

        function checkAndNotifyExpired(schedule) {
            if (!schedule.completed && getRemainSeconds(schedule.deadline) <= 0 && !notifiedSet.has(schedule.id)) {
                notifiedSet.add(schedule.id);
                saveNotifiedSet();
                showSystemNotification(schedule);
                if (document.visibilityState === 'visible') {
                    alertingId = schedule.id;
                    showAlert(schedule);
                }
            }
        }

        // ---------- 渲染表格 ----------
        function renderTable() {
            const now = getNow();
            document.getElementById('currentTime').textContent = `当前时间：${now.toLocaleString()}`;
            schedules.sort((a, b) => (a.deadline || '').localeCompare(b.deadline || ''));

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            let lastDate = '';

            for (const s of schedules) {
                const deadline = s.deadline || '';
                const datePart = deadline.slice(0, 10);
                if (datePart && datePart !== lastDate) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td colspan="6" class="date-separator"><span class="date-text">${datePart} ${getWeekdayCN(datePart)}</span></td>`;
                    tbody.appendChild(tr);
                }
                lastDate = datePart;

                checkAndNotifyExpired(s);

                const statusInfo = getStatusInfo(s);
                const countdownParts = s.completed ? [] : calcCountdownDisplay(deadline);

                const tr = document.createElement('tr');

                // 截止时间列内容
                const deadlineCell = document.createElement('td');
                deadlineCell.innerHTML = `
                    <div class="deadline-cell">
                        <span class="deadline-date">${deadline.slice(0,10)}</span>
                        <span>${deadline.slice(11)}</span>
                        <span class="deadline-status ${statusInfo.class}">${statusInfo.text}</span>
                    </div>
                `;

                // 倒计时列
                const countdownCell = document.createElement('td');
                if (countdownParts.length > 0) {
                    const partsHtml = countdownParts.map(p => `<span>${p}</span>`).join('');
                    countdownCell.innerHTML = `<div class="countdown-cell">${partsHtml}</div>`;
                } else {
                    countdownCell.textContent = '';
                }

                // 操作列
                const actionCell = document.createElement('td');
                actionCell.innerHTML = `
                    <div class="btn-group">
                        <button onclick="openEditModal('${s.id}')">修改</button>
                        <button onclick="openStatusModal('${s.id}')">状态</button>
                        <button class="btn-danger" onclick="deleteSchedule('${s.id}')">删除</button>
                    </div>
                `;

                tr.appendChild(createCell(s.thing));
                tr.appendChild(createCell(s.responsible));
                tr.appendChild(createCell(s.implementer));
                tr.appendChild(deadlineCell);
                tr.appendChild(countdownCell);
                tr.appendChild(actionCell);
                tbody.appendChild(tr);
            }
        }

        function createCell(text) {
            const td = document.createElement('td');
            td.textContent = text || '';
            return td;
        }

        // ---------- 提醒弹窗 ----------
        function showAlert(s) {
            document.getElementById('alertMsg').innerHTML = `
                <strong>事项：</strong>${s.thing}<br>
                <strong>负责人：</strong>${s.responsible}<br>
                <strong>落实人：</strong>${s.implementer}<br>
                <strong>截止时间：</strong>${s.deadline}<br><br>⏰ 时间已到，请确认状态
            `;
            document.getElementById('alertModal').style.display = 'flex';
        }
        function alertComplete() {
            if (alertingId) markComplete(alertingId);
            document.getElementById('alertModal').style.display = 'none';
            alertingId = null;
        }
        function alertPostpone() {
            if (alertingId) {
                document.getElementById('alertModal').style.display = 'none';
                openEditModal(alertingId);
                alertingId = null;
            }
        }

        // ---------- 状态模态框 ----------
        function openStatusModal(id) {
            currentStatusScheduleId = id;
            const s = schedules.find(item => item.id === id);
            const optionsDiv = document.getElementById('statusOptions');
            optionsDiv.innerHTML = '';

            if (s.completed) {
                const doneBtn = document.createElement('button');
                doneBtn.textContent = '已完成';
                doneBtn.disabled = true;
                doneBtn.style.background = '#ccc';
                optionsDiv.appendChild(doneBtn);

                const postponeBtn = document.createElement('button');
                postponeBtn.textContent = '延期提醒';
                postponeBtn.onclick = () => {
                    closeStatusModal();
                    openEditModal(id);
                };
                optionsDiv.appendChild(postponeBtn);
            } else {
                const completeBtn = document.createElement('button');
                completeBtn.textContent = '已完成';
                completeBtn.onclick = () => {
                    closeStatusModal();
                    openConfirmModal(id);
                };
                optionsDiv.appendChild(completeBtn);

                const progressBtn = document.createElement('button');
                progressBtn.textContent = '进行中';
                progressBtn.onclick = () => {
                    const sch = schedules.find(item => item.id === id);
                    if (sch) {
                        sch.completed = false;
                        notifiedSet.delete(id);
                        saveNotifiedSet();
                        saveData();
                    }
                    closeStatusModal();
                };
                optionsDiv.appendChild(progressBtn);
            }

            document.getElementById('statusModal').style.display = 'flex';
        }

        function closeStatusModal() {
            document.getElementById('statusModal').style.display = 'none';
            currentStatusScheduleId = null;
        }

        // ---------- 确认完成模态框 ----------
        function openConfirmModal(id) {
            pendingCompleteId = id;
            document.getElementById('confirmModal').style.display = 'flex';
        }
        function closeConfirmModal() {
            document.getElementById('confirmModal').style.display = 'none';
            pendingCompleteId = null;
        }
        function confirmComplete() {
            if (pendingCompleteId) {
                markComplete(pendingCompleteId);
            }
            closeConfirmModal();
        }

        // ---------- 数据操作 ----------
        function markComplete(id) {
            const s = schedules.find(item => item.id === id);
            if (s) {
                s.completed = true;
                notifiedSet.delete(id);
                saveNotifiedSet();
                saveData();
            }
        }

        function deleteSchedule(id) {
            if (confirm('确定删除此日程吗？')) {
                schedules = schedules.filter(item => item.id !== id);
                notifiedSet.delete(id);
                saveNotifiedSet();
                saveData();
            }
        }

        // ---------- 修改/添加 ----------
        function openEditModal(id) {
            const s = schedules.find(item => item.id === id);
            if (!s) return;
            editingId = id;
            document.getElementById('modalTitle').textContent = '修改截止时间';
            document.getElementById('thing').value = s.thing || '';
            document.getElementById('responsible').value = s.responsible || '';
            document.getElementById('implementer').value = s.implementer || '';
            const dt = new Date(s.deadline);
            document.getElementById('year').value = dt.getFullYear();
            document.getElementById('month').value = String(dt.getMonth() + 1).padStart(2, '0');
            document.getElementById('day').value = String(dt.getDate()).padStart(2, '0');
            document.getElementById('hour').value = String(dt.getHours()).padStart(2, '0');
            document.getElementById('minute').value = String(dt.getMinutes()).padStart(2, '0');
            document.getElementById('errorMsg').textContent = '';
            document.getElementById('editModal').style.display = 'flex';
        }

        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = '添加日程';
            document.getElementById('thing').value = '';
            document.getElementById('responsible').value = '';
            document.getElementById('implementer').value = '';
            setNowTime();
            document.getElementById('errorMsg').textContent = '';
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function setNowTime() {
            const now = getNow();
            document.getElementById('year').value = now.getFullYear();
            document.getElementById('month').value = String(now.getMonth() + 1).padStart(2, '0');
            document.getElementById('day').value = String(now.getDate()).padStart(2, '0');
            document.getElementById('hour').value = String(now.getHours()).padStart(2, '0');
            document.getElementById('minute').value = String(now.getMinutes()).padStart(2, '0');
        }

        function quickAdd(minutes) {
            const y = document.getElementById('year').value;
            const mo = document.getElementById('month').value;
            const d = document.getElementById('day').value;
            const h = document.getElementById('hour').value;
            const mi = document.getElementById('minute').value;
            const dt = new Date(y, mo-1, d, h, mi);
            dt.setMinutes(dt.getMinutes() + minutes);
            document.getElementById('year').value = dt.getFullYear();
            document.getElementById('month').value = String(dt.getMonth() + 1).padStart(2, '0');
            document.getElementById('day').value = String(dt.getDate()).padStart(2, '0');
            document.getElementById('hour').value = String(dt.getHours()).padStart(2, '0');
            document.getElementById('minute').value = String(dt.getMinutes()).padStart(2, '0');
        }

        function saveSchedule() {
            const thing = document.getElementById('thing').value.trim();
            const resp = document.getElementById('responsible').value.trim();
            const impl = document.getElementById('implementer').value.trim();
            const y = parseInt(document.getElementById('year').value);
            const mo = parseInt(document.getElementById('month').value);
            const d = parseInt(document.getElementById('day').value);
            const h = parseInt(document.getElementById('hour').value);
            const mi = parseInt(document.getElementById('minute').value);

            if (!thing) { document.getElementById('errorMsg').textContent = '事项不能为空'; return; }
            if (isNaN(y) || isNaN(mo) || isNaN(d) || isNaN(h) || isNaN(mi)) {
                document.getElementById('errorMsg').textContent = '日期时间必须填完整'; return;
            }
            const deadlineDate = new Date(y, mo-1, d, h, mi);
            if (deadlineDate <= getNow()) {
                document.getElementById('errorMsg').textContent = '截止时间不能早于当前时间'; return;
            }
            const deadlineStr = formatDateTime(deadlineDate);

            if (editingId) {
                const s = schedules.find(item => item.id === editingId);
                if (s) {
                    s.deadline = deadlineStr;
                    s.completed = false;
                    notifiedSet.delete(editingId);
                    saveNotifiedSet();
                }
            } else {
                schedules.push({
                    id: generateId(),
                    thing,
                    responsible: resp,
                    implementer: impl,
                    deadline: deadlineStr,
                    completed: false
                });
            }
            saveData();
            closeModal();
        }

        // ---------- 初始化 ----------
        function init() {
            loadData();
            loadNotifiedSet();
            requestNotificationPermission();
            renderTable();
            setInterval(renderTable, 1000);
            window.onclick = function(event) {
                if (event.target.classList.contains('modal')) {
                    event.target.style.display = 'none';
                }
            };
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js');
            }
        }
        init();
    </script>
</body>
</html>
