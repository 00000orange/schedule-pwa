<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>日程提醒</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2E54A1">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        :root {
            --base-font-size: 14px;
            --header-height: 50px;
            --time-bar-height: 36px;
            --bg: #f5f5f5;
            --table-bg: white;
            --text-color: #333;
            --header-bg: #2E54A1;
            --header-text: #FFF2BD;
            --time-bg: #e9ecef;
            --separator-bg: #D9ECFF;
        }
        .dark-mode {
            --bg: #1e1e1e;
            --table-bg: #2c2c2c;
            --text-color: #ddd;
            --header-bg: #1a1a2e;
            --time-bg: #333;
            --separator-bg: #3a3a5c;
        }

        @media (max-width: 400px) {
            :root { --base-font-size: 12px; }
            .time-row input { font-size: 12px !important; }
            .time-row span { font-size: 11px !important; }
        }
        @media (min-width: 401px) and (max-width: 600px) {
            :root { --base-font-size: 13px; }
        }
        @media (min-width: 601px) {
            :root { --base-font-size: 14px; }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Microsoft YaHei', sans-serif; }
        html, body {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; touch-action: manipulation;
            -webkit-user-select: none; user-select: none;
        }
        body {
            background: var(--bg); display: flex; flex-direction: column;
            font-size: var(--base-font-size); color: var(--text-color);
        }
        .header {
            background: var(--header-bg); color: var(--header-text); padding: 0 8px;
            display: flex; align-items: center; justify-content: space-between;
            height: var(--header-height); flex-shrink: 0; z-index: 10; gap: 4px;
        }
        .header .title {
            font-size: 1.4em; display: flex; align-items: center; gap: 6px;
            flex-shrink: 0; max-width: calc(100% - 120px);
        }
        .header .btn-row { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
        .header button {
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
            font-size: 1.1em; display: flex; align-items: center; justify-content: center;
            background: #FFF2BD; color: #333; height: 36px;
        }
        .btn-add { width: 36px; border-radius: 10px; }
        .btn-wide { width: auto; padding: 0 10px; border-radius: 10px; }
        .btn-refresh {
            background: transparent !important; color: var(--header-text) !important;
            font-size: 1.4em; width: 36px; height: 36px; border-radius: 50%;
        }
        .btn-darkmode {
            background: transparent !important; border: none; font-size: 1.5em;
            width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: var(--header-text);
        }

        .current-time {
            background: var(--time-bg); padding: 0 15px; font-size: 0.85em; text-align: center;
            border-bottom: 1px solid #ccc; height: var(--time-bar-height);
            line-height: var(--time-bar-height); position: relative; flex-shrink: 0; z-index: 10;
        }
        .watermark {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            color: rgba(0,0,0,0.08); font-size: 0.75em; pointer-events: none;
        }

        .table-container {
            flex: 1; overflow-y: auto; padding: 0 8px 70px 8px;
            -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
            touch-action: pan-y; background: var(--table-bg);
        }
        table {
            width: 100%; table-layout: fixed; border-collapse: collapse;
            background: var(--table-bg); font-size: var(--base-font-size); color: var(--text-color);
        }
        th {
            background: var(--header-bg); color: var(--header-text); padding: 8px 4px;
            position: sticky; top: 0; z-index: 3; text-align: center;
        }
        td {
            padding: 6px 4px; border-bottom: 1px solid #ddd; text-align: center; vertical-align: middle;
        }
        th:nth-child(1) { width: 5em; } th:nth-child(2) { width: 3em; } th:nth-child(3) { width: 3em; }
        th:nth-child(4) { width: 10ch; } th:nth-child(5) { width: 3.5em; } th:nth-child(6) { width: 3em; }

        .date-separator td { background: var(--separator-bg); text-align: left; padding: 8px 4px; }
        .date-text {
            background: #2E54A1; color: #FFF2BD; padding: 4px 8px; border-radius: 4px;
            display: inline-block; font-weight: bold;
        }
        .row-completed td { color: #8eb47e; }
        .row-completed .btn-group button { background: #e0e0e0; }
        .row-urgent td { color: #d04040; }

        .dark-mode .btn-group button { background: #444; color: inherit; }
        .dark-mode .btn-group .btn-danger { background: #8b0000; }
        .dark-mode .row-completed .btn-group button { background: #444; }
        .dark-mode .status-text:not([style*="color:#8eb47e"]) { color: #ccc !important; }

        .deadline-cell { display: flex; flex-direction: column; align-items: center; }
        .status-text { font-size: 0.9em; margin-top: 6px; font-weight: bold; }
        .countdown-cell { display: flex; flex-direction: column; align-items: center; line-height: 1.4; }
        .btn-group { display: flex; flex-direction: column; gap: 3px; align-items: center; }
        .btn-group button {
            padding: 3px 6px; font-size: 0.75em; border: none; border-radius: 4px;
            background: #e0e0e0; cursor: pointer; width: 100%; color: inherit;
        }
        .btn-group .btn-danger { background: #ffcccc; }

        .fab-container {
            position: fixed; right: 12px; bottom: 10px; display: flex; flex-direction: column;
            gap: 6px; z-index: 20;
        }
        .fab {
            width: 42px; height: 42px; border-radius: 50%;
            background: rgba(245,245,245,0.55); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(200,200,200,0.3);
            font-size: 22px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: background 0.2s;
            color: #555; font-weight: bold;
        }
        .fab:active { background: rgba(255,255,255,0.9); }
        .dark-mode .fab { background: rgba(180,180,190,0.6); border-color: rgba(255,255,255,0.2); color: #333; }

        .version-info {
            text-align: center; padding: 4px 0 8px 0; font-size: 0.7em;
            color: rgba(0,0,0,0.12); pointer-events: none; flex-shrink: 0;
        }
        .dark-mode .version-info { color: rgba(255,255,255,0.15); }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: white; padding: 20px; border-radius: 12px; width: 90%;
            max-width: 420px; max-height: 85vh; overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 15px; color: #2E54A1; }
        .modal-content input[type="text"], .modal-content input[type="number"], .modal-content textarea {
            width: 100%; padding: 8px; margin: 6px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 1em;
        }
        .modal-content input[readonly] { background: #f9f9f9; cursor: pointer; }
        .time-row { display: flex; align-items: center; gap: 3px; flex-wrap: nowrap; }
        .time-row input { text-align: center; padding: 6px 2px; }
        .time-row .year { width: 5em; } .time-row .small { width: 3.5em; }
        .time-row span { font-size: 0.85em; white-space: nowrap; }
        .quick-btns { display: flex; flex-wrap: wrap; gap: 4px; margin: 10px 0; }
        .quick-btns button {
            background: #e0e0e0; color: black; padding: 6px 8px; font-size: 0.9em;
            border: none; border-radius: 6px; cursor: pointer; flex: 1 1 auto; min-width: 70px; text-align: center;
        }
        .quick-btns .break { flex-basis: 100%; height: 0; }

        .action-btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
        .action-btns button {
            padding: 8px 16px; font-size: 1em; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        .btn-primary { background: #2E54A1; color: #FFF2BD; }
        .btn-cancel { background: #ccc; color: #333; }

        .status-options { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
        .status-options button {
            padding: 10px; font-size: 1em; border: none; border-radius: 6px; background: #f0f0f0; cursor: pointer;
        }
        .toggle-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
        .switch { position: relative; width: 48px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #2E54A1; }
        input:checked + .slider:before { transform: translateX(22px); }

        .checkbox-group { display: flex; flex-wrap: wrap; gap: 12px; margin: 10px 0; }
        .checkbox-group label { display: flex; align-items: center; gap: 4px; font-size: 0.9em; }

        .custom-person-row { display: flex; gap: 6px; margin: 8px 0; }
        .custom-person-row input { flex: 1; }
        .custom-tag { display: inline-block; background: #e0e0e0; padding: 2px 8px; border-radius: 12px; margin: 2px; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">📅 日程提醒</div>
        <div class="btn-row">
            <button class="btn-refresh" onclick="location.reload()" title="刷新页面">🔄</button>
            <button class="btn-wide" onclick="openSettings()" title="提醒设置">🔔</button>
            <button class="btn-add" onclick="openAddModal()" title="添加日程">➕</button>
            <button class="btn-darkmode" id="darkModeToggle" onclick="toggleDarkMode()" title="夜间模式">🌙</button>
        </div>
    </div>
    <div class="current-time" id="currentTime">
        加载中…
        <span class="watermark">DESIGNED BY CDH</span>
    </div>
    <div class="table-container" id="tableContainer">
        <table id="scheduleTable">
            <thead>
                <tr><th>事项</th><th>负责人</th><th>落实人</th><th>截止时间</th><th>倒计时</th><th>操作</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="version-info" id="versionDisplay">v2026.06.23-120000</div>

    <div class="fab-container">
        <button class="fab" onclick="scrollToTop()" title="最早日程">▲</button>
        <button class="fab" onclick="scrollToToday()" title="今天日程">●</button>
        <button class="fab" onclick="scrollToBottom()" title="最后日程">▼</button>
    </div>

    <!-- 添加/修改日程模态框 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3 id="modalTitle">添加日程</h3>
            <input type="text" id="thing" placeholder="事项">
            <input type="text" id="responsible" placeholder="负责人（点击选择）" readonly onclick="openPersonSelect('responsible')">
            <input type="text" id="implementer" placeholder="落实人（点击选择）" readonly onclick="openPersonSelect('implementer')">
            <div class="time-row">
                <input type="number" id="year" class="year" placeholder="年"><span>年</span>
                <input type="number" id="month" class="small" placeholder="月"><span>月</span>
                <input type="number" id="day" class="small" placeholder="日"><span>日</span>
                <input type="number" id="hour" class="small" placeholder="时"><span>时</span>
                <input type="number" id="minute" class="small" placeholder="分"><span>分</span>
            </div>
            <div class="quick-btns">
                <button onclick="quickAdd(15*60)">15分钟后</button>
                <button onclick="quickAdd(60*60)">1小时后</button>
                <button onclick="quickAdd(6*3600)">6小时后</button>
                <div class="break"></div>
                <button onclick="quickAdd(24*3600)">1天后</button>
                <button onclick="quickAdd(7*24*3600)">1星期后</button>
                <button onclick="setNowTime()">当前时间</button>
            </div>
            <div id="errorMsg" style="color: red; font-size: 0.9em; min-height: 20px;"></div>
            <div class="action-btns">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-primary" onclick="saveSchedule()">确定</button>
            </div>
        </div>
    </div>

    <!-- 人员多选模态框 -->
    <div class="modal" id="personSelectModal">
        <div class="modal-content">
            <h3 id="personSelectTitle">选择人员</h3>
            <div class="checkbox-group" id="personCheckboxes"></div>
            <div class="custom-person-row">
                <input type="text" id="customPersonInput" placeholder="输入自定义人名">
                <button onclick="addCustomPerson()" class="btn-primary" style="width: auto;">添加</button>
            </div>
            <div id="customTagsContainer" style="margin: 8px 0;"></div>
            <div class="action-btns">
                <button class="btn-cancel" onclick="closePersonSelect()">取消</button>
                <button class="btn-primary" onclick="confirmPersonSelect()">确认</button>
            </div>
        </div>
    </div>

    <!-- 状态、提醒、确认、早于时间模态框 -->
    <div class="modal" id="statusModal">
        <div class="modal-content">
            <h3>选择状态</h3>
            <div class="status-options" id="statusOptions"></div>
            <div class="action-btns" style="justify-content: center;">
                <button class="btn-cancel" onclick="closeStatusModal()">取消</button>
            </div>
        </div>
    </div>

    <div class="modal" id="alertModal">
        <div class="modal-content" style="text-align: center;">
            <h3>⏰ 日程提醒</h3>
            <p id="alertMsg" style="margin: 15px 0; font-size: 1.1em;"></p>
            <div class="action-btns" style="justify-content: center;">
                <button class="btn-primary" onclick="alertComplete()">已完成</button>
                <button class="btn-cancel" onclick="alertPostpone()">延期提醒</button>
            </div>
        </div>
    </div>

    <div class="modal" id="confirmModal">
        <div class="modal-content" style="text-align: center;">
            <p style="font-size: 1.2em;">确认标记为“已完成”？</p>
            <div class="action-btns" style="justify-content: center;">
                <button class="btn-cancel" onclick="closeConfirmModal()">取消</button>
                <button class="btn-primary" onclick="confirmComplete()">确认完成</button>
            </div>
        </div>
    </div>

    <div class="modal" id="pastTimeModal">
        <div class="modal-content" style="text-align: center;">
            <p style="font-size: 1.1em;">确认要设置该时间吗？<br>该时间早于当前时间</p>
            <div class="action-btns" style="justify-content: center;">
                <button class="btn-cancel" onclick="closePastTimeModal()">取消</button>
                <button class="btn-primary" onclick="confirmPastTime()">确认</button>
            </div>
        </div>
    </div>

    <!-- 设置模态框（包含人员名单编辑） -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h3>🔔 提醒设置</h3>
            <div class="toggle-row">
                <span>启用默认提醒</span>
                <label class="switch">
                    <input type="checkbox" id="defaultReminderEnabled" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <p style="font-size:0.8em; color:#666; margin-top: -5px;">距截止 ≤7天提前3天 / 8-14天提前7天 / >14天提前14天</p>
            <p style="font-size:0.9em; margin-bottom:8px; margin-top:10px;">自定义提醒节点（可多选）</p>
            <div class="checkbox-group" id="reminderPointsGroup">
                <label><input type="checkbox" value="24h" checked> 提前1天</label>
                <label><input type="checkbox" value="6h" checked> 提前6小时</label>
                <label><input type="checkbox" value="1h" checked> 提前1小时</label>
                <label><input type="checkbox" value="expired" checked> 到期时</label>
            </div>
            <div class="toggle-row">
                <span>启用系统提醒</span>
                <label class="switch">
                    <input type="checkbox" id="notifyEnabled" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="toggle-row">
                <span>启用邮件通知</span>
                <label class="switch">
                    <input type="checkbox" id="emailEnabled">
                    <span class="slider"></span>
                </label>
            </div>
            <p style="font-size:0.8em; color:#666;">邮件配置 (EmailJS)</p>
            <input type="text" id="emailPublicKey" placeholder="EmailJS Public Key">
            <input type="text" id="emailServiceId" placeholder="Service ID">
            <input type="text" id="emailTemplateId" placeholder="Template ID">
            <input type="text" id="emailTo" placeholder="收件邮箱 (如 your@qq.com)">
            <p style="font-size:0.9em; margin-top:10px;">自定义人员名单（逗号分隔）</p>
            <input type="text" id="responsibleListInput" placeholder="负责人名单">
            <input type="text" id="implementerListInput" placeholder="落实人名单">
            <div class="action-btns">
                <button class="btn-primary" onclick="confirmSettings()">确认</button>
            </div>
        </div>
    </div>

    <script>
        emailjs.init('');

        const STORAGE_KEY = 'schedules_data';
        const REMINDER_FIRED_KEY = 'reminder_fired';
        const SETTINGS_KEY = 'app_settings';
        let schedules = [];
        let editingId = null;
        let alertingId = null;
        let currentStatusScheduleId = null;
        let pendingCompleteId = null;
        let reminderFired = {};
        let appSettings = {
            defaultReminderEnabled: true,
            reminderPoints: ['24h','6h','1h','expired'],
            notifyEnabled: true,
            emailEnabled: false,
            emailPublicKey: '',
            emailServiceId: '',
            emailTemplateId: '',
            emailTo: '',
            responsibleList: ['高宇奇', '陈典豪', '黄紫薇'],
            implementerList: ['高宇奇', '陈典豪', '黄紫薇', '蔡启文', '董晨宇', '郭丰']
        };
        let pastTimePending = null;
        let modalCount = 0;
        let currentPersonField = '';
        let tempSelectedPersons = [];
        let tempCustomPersons = [];

        const APP_VERSION = 'v2026.06.23-120000';
        document.getElementById('versionDisplay').textContent = APP_VERSION;

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('darkModeToggle');
            if (document.body.classList.contains('dark-mode')) {
                btn.textContent = '☀️'; btn.style.color = '#FFD700';
            } else {
                btn.textContent = '🌙'; btn.style.color = '';
            }
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }
        (function() {
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                const btn = document.getElementById('darkModeToggle');
                btn.textContent = '☀️'; btn.style.color = '#FFD700';
            }
        })();

        function lockScroll() { modalCount++; document.body.style.overflow = 'hidden'; }
        function unlockScroll() { if (modalCount > 0) modalCount--; if (modalCount === 0) document.body.style.overflow = ''; }
        document.addEventListener('dblclick', e => e.preventDefault(), {passive: false});

        // 数据管理
        function loadReminderFired() { const raw = localStorage.getItem(REMINDER_FIRED_KEY); reminderFired = raw ? JSON.parse(raw) : {}; }
        function saveReminderFired() { localStorage.setItem(REMINDER_FIRED_KEY, JSON.stringify(reminderFired)); }
        function resetReminderFiredForSchedule(id) { delete reminderFired[id]; saveReminderFired(); }
        function loadData() { const raw = localStorage.getItem(STORAGE_KEY); schedules = raw ? JSON.parse(raw) : []; }
        function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(schedules)); }
        function loadSettings() {
            const raw = localStorage.getItem(SETTINGS_KEY);
            if (raw) {
                try { const loaded = JSON.parse(raw); appSettings = { ...appSettings, ...loaded }; } catch(e) {}
            }
            document.getElementById('defaultReminderEnabled').checked = appSettings.defaultReminderEnabled !== false;
            const pointsGroup = document.getElementById('reminderPointsGroup');
            if (pointsGroup) {
                const checks = pointsGroup.querySelectorAll('input[type=checkbox]');
                checks.forEach(cb => { cb.checked = appSettings.reminderPoints.includes(cb.value); });
            }
            document.getElementById('notifyEnabled').checked = appSettings.notifyEnabled;
            document.getElementById('emailEnabled').checked = appSettings.emailEnabled;
            document.getElementById('emailPublicKey').value = appSettings.emailPublicKey || '';
            document.getElementById('emailServiceId').value = appSettings.emailServiceId || '';
            document.getElementById('emailTemplateId').value = appSettings.emailTemplateId || '';
            document.getElementById('emailTo').value = appSettings.emailTo || '';
            document.getElementById('responsibleListInput').value = (appSettings.responsibleList || []).join(',');
            document.getElementById('implementerListInput').value = (appSettings.implementerList || []).join(',');
            if (appSettings.emailPublicKey) emailjs.init(appSettings.emailPublicKey);
        }
        function saveSettings() {
            appSettings.defaultReminderEnabled = document.getElementById('defaultReminderEnabled').checked;
            const pointsGroup = document.getElementById('reminderPointsGroup');
            const checks = pointsGroup.querySelectorAll('input[type=checkbox]:checked');
            appSettings.reminderPoints = Array.from(checks).map(cb => cb.value);
            appSettings.notifyEnabled = document.getElementById('notifyEnabled').checked;
            appSettings.emailEnabled = document.getElementById('emailEnabled').checked;
            appSettings.emailPublicKey = document.getElementById('emailPublicKey').value.trim();
            appSettings.emailServiceId = document.getElementById('emailServiceId').value.trim();
            appSettings.emailTemplateId = document.getElementById('emailTemplateId').value.trim();
            appSettings.emailTo = document.getElementById('emailTo').value.trim();
            appSettings.responsibleList = document.getElementById('responsibleListInput').value.split(',').map(s => s.trim()).filter(s => s);
            appSettings.implementerList = document.getElementById('implementerListInput').value.split(',').map(s => s.trim()).filter(s => s);
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(appSettings));
            if (appSettings.emailPublicKey) emailjs.init(appSettings.emailPublicKey);
        }
        function canSendEmail() { return appSettings.emailEnabled && appSettings.emailPublicKey && appSettings.emailServiceId && appSettings.emailTemplateId && appSettings.emailTo; }
        function sendReminderEmail(schedule, label) {
            if (!canSendEmail()) return;
            emailjs.send(appSettings.emailServiceId, appSettings.emailTemplateId, {
                to_email: appSettings.emailTo, thing: schedule.thing,
                responsible: schedule.responsible || '无', implementer: schedule.implementer || '无',
                deadline: schedule.deadline, status: '提醒',
                time: new Date().toLocaleString(), subject: `提醒事项 ${label}`
            }).catch(err => console.warn('邮件发送失败:', err));
        }
        function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }
        function getNow() { return new Date(); }
        function formatDateTime(date) {
            return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}:00`;
        }
        function getWeekdayCN(dateStr) {
            const days = ['日','一','二','三','四','五','六'];
            return '星期' + days[new Date(dateStr).getDay()];
        }
        function calcCountdownParts(deadlineStr, now) {
            const dl = new Date(deadlineStr);
            const diff = dl - now;
            if (diff <= 0) return null;
            const totalSec = Math.floor(diff / 1000);
            const days = Math.floor(totalSec / 86400);
            const hours = Math.floor((totalSec % 86400) / 3600);
            const mins = Math.floor((totalSec % 3600) / 60);
            const secs = totalSec % 60;
            return { days, hours, mins, secs, totalSec };
        }
        function formatAdvanceText(diffSec) {
            if (diffSec <= 0) return '';
            const days = Math.floor(diffSec / 86400);
            const hours = Math.floor((diffSec % 86400) / 3600);
            const mins = Math.floor((diffSec % 3600) / 60);
            const secs = diffSec % 60;
            const parts = ['提前'];
            if (days > 0) parts.push(`${days}天`);
            if (hours > 0 || days > 0) parts.push(`${hours}小时`);
            parts.push(`${mins}分钟${secs}秒`);
            parts.push('完成');
            return parts.join(' ');
        }

        function checkAllReminders(schedule, now) {
            if (schedule.completed) return;
            const dl = new Date(schedule.deadline);
            const diffSec = Math.floor((dl - now) / 1000);
            const id = schedule.id;
            if (!reminderFired[id]) reminderFired[id] = [];

            if (appSettings.defaultReminderEnabled) {
                const diffDays = diffSec / 86400;
                let defaultKey = null;
                let defaultLabel = '';

                if (diffDays <= 7 && diffDays > 0) {
                    if (diffSec <= 3*86400 + 60 && diffSec >= 3*86400 - 60) {
                        defaultKey = 'default_3d'; defaultLabel = '提前3天';
                    }
                } else if (diffDays <= 14 && diffDays > 7) {
                    if (diffSec <= 7*86400 + 60 && diffSec >= 7*86400 - 60) {
                        defaultKey = 'default_7d'; defaultLabel = '提前1周';
                    }
                } else if (diffDays > 14) {
                    if (diffSec <= 14*86400 + 60 && diffSec >= 14*86400 - 60) {
                        defaultKey = 'default_14d'; defaultLabel = '提前2周';
                    }
                }

                if (defaultKey && !reminderFired[id].includes(defaultKey)) {
                    reminderFired[id].push(defaultKey); saveReminderFired();
                    if (appSettings.notifyEnabled && 'Notification' in window && Notification.permission === 'granted') {
                        new Notification('⏰ 日程提醒', { body: `${schedule.thing} ${defaultLabel}`, tag: id + defaultKey });
                    }
                    if (canSendEmail()) sendReminderEmail(schedule, defaultLabel);
                }
            }

            const pointMap = {
                '24h': { seconds: 24*3600, label: '1天' },
                '6h': { seconds: 6*3600, label: '6小时' },
                '1h': { seconds: 3600, label: '1小时' },
                'expired': { seconds: 0, label: '已到期' }
            };

            for (const pointKey of appSettings.reminderPoints) {
                const point = pointMap[pointKey];
                if (!point || reminderFired[id].includes(pointKey)) continue;

                if (pointKey === 'expired') {
                    if (diffSec <= 0 && !reminderFired[id].includes('expired')) {
                        reminderFired[id].push('expired'); saveReminderFired();
                        if (appSettings.notifyEnabled && 'Notification' in window && Notification.permission === 'granted') {
                            new Notification('⏰ 日程提醒', { body: `${schedule.thing} 时间到`, tag: id + 'expired' });
                        }
                        if (canSendEmail()) sendReminderEmail(schedule, '已到期');
                        if (document.visibilityState === 'visible') {
                            alertingId = id;
                            document.getElementById('alertMsg').innerHTML = `<strong>事项：</strong>${schedule.thing}<br>时间已到`;
                            document.getElementById('alertModal').style.display = 'flex'; lockScroll();
                        }
                    }
                } else {
                    const threshold = 60;
                    if (diffSec <= point.seconds + threshold && diffSec >= point.seconds - threshold && diffSec > 0) {
                        reminderFired[id].push(pointKey); saveReminderFired();
                        if (appSettings.notifyEnabled && 'Notification' in window && Notification.permission === 'granted') {
                            new Notification('⏰ 日程提醒', { body: `${schedule.thing} 剩余${point.label}`, tag: id + pointKey });
                        }
                        if (canSendEmail()) sendReminderEmail(schedule, `剩余${point.label}`);
                    }
                }
            }
        }

        function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
        function smoothScrollTo(targetY, duration = 800) {
            const container = document.getElementById('tableContainer');
            const startY = container.scrollTop;
            const change = targetY - startY;
            const startTime = performance.now();
            function animateScroll(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = easeInOutQuad(progress);
                container.scrollTop = startY + change * eased;
                if (progress < 1) requestAnimationFrame(animateScroll);
            }
            requestAnimationFrame(animateScroll);
        }
        function findTodayRow() {
            if (!schedules.length) return null;
            const now = getNow(); const todayStr = now.toISOString().slice(0,10);
            const first = schedules.find(s => !s.completed && s.deadline.slice(0,10) >= todayStr) || schedules[0];
            const rows = document.querySelectorAll('#tableBody tr');
            for (const row of rows) { if (row.cells[0]?.textContent === first.thing) return row; }
            return rows[0] || null;
        }
        function scrollToTop() { smoothScrollTo(0); }
        function scrollToToday() {
            const row = findTodayRow(); if (!row) return;
            const container = document.getElementById('tableContainer');
            const rowTop = row.offsetTop; const rowHeight = row.offsetHeight;
            const containerHeight = container.clientHeight;
            let targetY = rowTop - (containerHeight / 2) + (rowHeight / 2);
            if (targetY < 0) targetY = 0;
            const maxScroll = container.scrollHeight - containerHeight;
            if (targetY > maxScroll) targetY = maxScroll;
            smoothScrollTo(targetY);
        }
        function scrollToBottom() {
            const container = document.getElementById('tableContainer');
            const rows = document.querySelectorAll('#tableBody tr'); if (!rows.length) return;
            const lastRow = rows[rows.length - 1];
            const rowTop = lastRow.offsetTop; const rowHeight = lastRow.offsetHeight;
            const containerHeight = container.clientHeight;
            let targetY = rowTop - (containerHeight / 2) + (rowHeight / 2);
            const maxScroll = container.scrollHeight - containerHeight;
            if (targetY > maxScroll) targetY = maxScroll;
            if (targetY < 0) targetY = 0;
            smoothScrollTo(targetY);
        }

        function renderTable() {
            const now = getNow();
            document.getElementById('currentTime').innerHTML = `当前时间：${now.toLocaleString()} <span class="watermark">DESIGNED BY CDH</span>`;
            schedules.sort((a,b) => (a.deadline||'').localeCompare(b.deadline||''));
            const tbody = document.getElementById('tableBody'); tbody.innerHTML = '';
            let lastDate = '';

            for (const s of schedules) {
                const deadline = s.deadline || ''; const datePart = deadline.slice(0,10);
                if (datePart && datePart !== lastDate) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td colspan="6" class="date-separator"><span class="date-text">${datePart} ${getWeekdayCN(datePart)}</span></td>`;
                    tbody.appendChild(tr);
                }
                lastDate = datePart;

                const isCompleted = s.completed || false; let rowClass = '', statusHtml = '', countdownHtml = '';

                if (isCompleted) {
                    rowClass = 'row-completed'; statusHtml = '<span class="status-text" style="color:#8eb47e;">已完成</span>';
                    countdownHtml = s.completed_countdown || '';
                } else if (deadline) {
                    const dl = new Date(deadline); const diffMs = dl - now;
                    if (diffMs <= 0) {
                        rowClass = 'row-completed'; statusHtml = '<span class="status-text" style="color:#8eb47e;">已完成</span>';
                        countdownHtml = '计时结束';
                    } else {
                        const diffHours = diffMs / 3600000; let statusColor, statusText;
                        if (diffHours <= 1) { statusColor = '#d04040'; statusText = '时间快到了'; }
                        else if (diffHours <= 3) { statusColor = 'orange'; statusText = '加油干！'; }
                        else { statusColor = '#333'; statusText = '进行中'; }
                        statusHtml = `<span class="status-text" style="color:${statusColor}; font-weight:bold;">${statusText}</span>`;
                        const parts = calcCountdownParts(deadline, now);
                        if (parts) {
                            const seg = [];
                            if (parts.days > 0) seg.push(`${parts.days}天`);
                            if (parts.hours > 0 || parts.days > 0) seg.push(`${String(parts.hours).padStart(2,'0')}时`);
                            if (parts.mins > 0 || parts.hours > 0 || parts.days > 0) seg.push(`${String(parts.mins).padStart(2,'0')}分`);
                            seg.push(`${String(parts.secs).padStart(2,'0')}秒`);
                            countdownHtml = seg.join('<br>');
                        }
                        rowClass = diffHours <= 3 ? 'row-urgent' : '';
                    }
                    checkAllReminders(s, now);
                }

                const tr = document.createElement('tr'); tr.className = rowClass;
                tr.innerHTML = `
                    <td>${s.thing||''}</td>
                    <td>${s.responsible||''}</td>
                    <td>${s.implementer||''}</td>
                    <td><div class="deadline-cell"><span>${deadline.slice(0,10)}</span><span>${deadline.slice(11)}</span>${statusHtml}</div></td>
                    <td><div class="countdown-cell">${countdownHtml}</div></td>
                    <td><div class="btn-group">
                        <button onclick="openEditModal('${s.id}')">修改</button>
                        <button onclick="openStatusModal('${s.id}')">状态</button>
                        <button class="btn-danger" onclick="deleteSchedule('${s.id}')">删除</button>
                    </div></td>
                `;
                tbody.appendChild(tr);
            }

            const fillerTr = document.createElement('tr');
            fillerTr.innerHTML = `<td colspan="6" style="height: calc(10 * 1.5em); background: transparent; border: none;"></td>`;
            tbody.appendChild(fillerTr);
        }

        function openStatusModal(id) {
            currentStatusScheduleId = id; const s = schedules.find(i => i.id === id); if (!s) return;
            const div = document.getElementById('statusOptions'); div.innerHTML = '';
            if (s.completed) {
                const doneBtn = document.createElement('button'); doneBtn.textContent = '已完成'; doneBtn.disabled = true;
                doneBtn.style.background = '#ccc'; div.appendChild(doneBtn);
                const postponeBtn = document.createElement('button'); postponeBtn.textContent = '延期提醒';
                postponeBtn.onclick = () => { closeStatusModal(); openEditModal(id); }; div.appendChild(postponeBtn);
            } else {
                const completeBtn = document.createElement('button'); completeBtn.textContent = '已完成';
                completeBtn.onclick = () => { closeStatusModal(); openConfirmModal(id); }; div.appendChild(completeBtn);
            }
            document.getElementById('statusModal').style.display = 'flex'; lockScroll();
        }
        function closeStatusModal() { document.getElementById('statusModal').style.display = 'none'; unlockScroll(); }

        function openConfirmModal(id) { pendingCompleteId = id; document.getElementById('confirmModal').style.display = 'flex'; lockScroll(); }
        function closeConfirmModal() { pendingCompleteId = null; document.getElementById('confirmModal').style.display = 'none'; unlockScroll(); }
        function confirmComplete() {
            if (pendingCompleteId) {
                const s = schedules.find(i => i.id === pendingCompleteId);
                if (s) {
                    const now = getNow(); const dl = new Date(s.deadline); const diffSec = Math.floor((dl - now) / 1000);
                    if (diffSec > 0) s.completed_countdown = formatAdvanceText(diffSec); else s.completed_countdown = '';
                    s.completed = true; resetReminderFiredForSchedule(pendingCompleteId); saveData();
                }
            }
            closeConfirmModal();
        }

        function alertComplete() {
            if (alertingId) {
                const s = schedules.find(i => i.id === alertingId);
                if (s) {
                    const now = getNow(); const dl = new Date(s.deadline); const diffSec = Math.floor((dl - now) / 1000);
                    s.completed_countdown = diffSec > 0 ? formatAdvanceText(diffSec) : ''; s.completed = true;
                    resetReminderFiredForSchedule(alertingId); saveData();
                }
            }
            document.getElementById('alertModal').style.display = 'none'; unlockScroll(); alertingId = null;
        }
        function alertPostpone() {
            if (alertingId) { document.getElementById('alertModal').style.display = 'none'; unlockScroll(); openEditModal(alertingId); alertingId = null; }
        }

        function openAddModal() {
            editingId = null; document.getElementById('modalTitle').textContent = '添加日程';
            document.getElementById('thing').value = ''; document.getElementById('responsible').value = '';
            document.getElementById('implementer').value = ''; setNowTime();
            document.getElementById('errorMsg').textContent = ''; document.getElementById('editModal').style.display = 'flex'; lockScroll();
        }
        function openEditModal(id) {
            const s = schedules.find(i => i.id === id); if (!s) return;
            editingId = id; document.getElementById('modalTitle').textContent = '修改日程';
            document.getElementById('thing').value = s.thing || ''; document.getElementById('responsible').value = s.responsible || '';
            document.getElementById('implementer').value = s.implementer || '';
            const dt = new Date(s.deadline); document.getElementById('year').value = dt.getFullYear();
            document.getElementById('month').value = String(dt.getMonth()+1).padStart(2,'0');
            document.getElementById('day').value = String(dt.getDate()).padStart(2,'0');
            document.getElementById('hour').value = String(dt.getHours()).padStart(2,'0');
            document.getElementById('minute').value = String(dt.getMinutes()).padStart(2,'0');
            document.getElementById('errorMsg').textContent = ''; document.getElementById('editModal').style.display = 'flex'; lockScroll();
        }
        function closeModal() { document.getElementById('editModal').style.display = 'none'; unlockScroll(); }
        function setNowTime() {
            const now = getNow(); document.getElementById('year').value = now.getFullYear();
            document.getElementById('month').value = String(now.getMonth()+1).padStart(2,'0');
            document.getElementById('day').value = String(now.getDate()).padStart(2,'0');
            document.getElementById('hour').value = String(now.getHours()).padStart(2,'0');
            document.getElementById('minute').value = String(now.getMinutes()).padStart(2,'0');
        }
        function quickAdd(seconds) {
            const y=parseInt(document.getElementById('year').value), mo=parseInt(document.getElementById('month').value),
                  d=parseInt(document.getElementById('day').value), h=parseInt(document.getElementById('hour').value),
                  mi=parseInt(document.getElementById('minute').value);
            if (isNaN(y)||isNaN(mo)||isNaN(d)||isNaN(h)||isNaN(mi)) return;
            const dt = new Date(y,mo-1,d,h,mi); dt.setTime(dt.getTime() + seconds*1000);
            document.getElementById('year').value = dt.getFullYear();
            document.getElementById('month').value = String(dt.getMonth()+1).padStart(2,'0');
            document.getElementById('day').value = String(dt.getDate()).padStart(2,'0');
            document.getElementById('hour').value = String(dt.getHours()).padStart(2,'0');
            document.getElementById('minute').value = String(dt.getMinutes()).padStart(2,'0');
        }

        // 人员选择
        function openPersonSelect(fieldId) {
            currentPersonField = fieldId;
            const list = fieldId === 'responsible' ? appSettings.responsibleList : appSettings.implementerList;
            const currentValue = document.getElementById(fieldId).value;
            const selectedNames = currentValue ? currentValue.split(',').map(s => s.trim()).filter(s => s) : [];
            tempSelectedPersons = [...selectedNames];
            tempCustomPersons = [];

            document.getElementById('personSelectTitle').textContent = fieldId === 'responsible' ? '选择负责人' : '选择落实人';
            const checkboxesDiv = document.getElementById('personCheckboxes');
            checkboxesDiv.innerHTML = '';

            list.forEach(name => {
                const label = document.createElement('label');
                const cb = document.createElement('input');
                cb.type = 'checkbox'; cb.value = name; cb.checked = tempSelectedPersons.includes(name);
                cb.addEventListener('change', () => {
                    if (cb.checked) { if (!tempSelectedPersons.includes(name)) tempSelectedPersons.push(name); }
                    else { tempSelectedPersons = tempSelectedPersons.filter(n => n !== name); }
                });
                label.appendChild(cb); label.appendChild(document.createTextNode(name));
                checkboxesDiv.appendChild(label);
            });

            const customAlready = selectedNames.filter(n => !list.includes(n));
            customAlready.forEach(n => { if (!tempCustomPersons.includes(n)) tempCustomPersons.push(n); });
            renderCustomTags();

            document.getElementById('customPersonInput').value = '';
            document.getElementById('personSelectModal').style.display = 'flex'; lockScroll();
        }
        function addCustomPerson() {
            const name = document.getElementById('customPersonInput').value.trim();
            if (!name) return;
            if (!tempCustomPersons.includes(name) && !tempSelectedPersons.includes(name)) {
                tempCustomPersons.push(name);
            }
            document.getElementById('customPersonInput').value = ''; renderCustomTags();
        }
        function renderCustomTags() {
            const container = document.getElementById('customTagsContainer');
            container.innerHTML = tempCustomPersons.map(n => `<span class="custom-tag">${n} <span style="cursor:pointer; margin-left:4px;" onclick="removeCustomPerson('${n}')">×</span></span>`).join('');
        }
        function removeCustomPerson(name) { tempCustomPersons = tempCustomPersons.filter(n => n !== name); renderCustomTags(); }
        function closePersonSelect() { document.getElementById('personSelectModal').style.display = 'none'; unlockScroll(); }
        function confirmPersonSelect() {
            const finalList = [...tempSelectedPersons];
            tempCustomPersons.forEach(n => { if (!finalList.includes(n)) finalList.push(n); });
            document.getElementById(currentPersonField).value = finalList.join(',');

            // 将新添加的自定义人名自动合并到长期名单中
            const targetList = currentPersonField === 'responsible' ? appSettings.responsibleList : appSettings.implementerList;
            let changed = false;
            tempCustomPersons.forEach(n => {
                if (!targetList.includes(n)) { targetList.push(n); changed = true; }
            });
            if (changed) {
                localStorage.setItem(SETTINGS_KEY, JSON.stringify(appSettings));
                document.getElementById('responsibleListInput').value = appSettings.responsibleList.join(',');
                document.getElementById('implementerListInput').value = appSettings.implementerList.join(',');
            }

            closePersonSelect();
        }

        function saveSchedule() {
            const thing = document.getElementById('thing').value.trim();
            const resp = document.getElementById('responsible').value.trim();
            const impl = document.getElementById('implementer').value.trim();
            const y=parseInt(document.getElementById('year').value), mo=parseInt(document.getElementById('month').value),
                  d=parseInt(document.getElementById('day').value), h=parseInt(document.getElementById('hour').value),
                  mi=parseInt(document.getElementById('minute').value);
            if (!thing) { document.getElementById('errorMsg').textContent='事项不能为空'; return; }
            if (isNaN(y)||isNaN(mo)||isNaN(d)||isNaN(h)||isNaN(mi)) { document.getElementById('errorMsg').textContent='日期时间必须填完整'; return; }
            const deadlineDate = new Date(y,mo-1,d,h,mi);
            if (deadlineDate <= getNow()) {
                pastTimePending = { year: y, month: mo, day: d, hour: h, minute: mi, thing, resp, impl, isEditing: editingId };
                document.getElementById('pastTimeModal').style.display = 'flex'; lockScroll(); return;
            }
            finalizeSchedule(thing, resp, impl, y, mo, d, h, mi);
        }

        function closePastTimeModal() { document.getElementById('pastTimeModal').style.display = 'none'; unlockScroll(); pastTimePending = null; }
        function confirmPastTime() {
            if (!pastTimePending) return;
            const { year, month, day, hour, minute, thing, resp, impl, isEditing } = pastTimePending;
            const deadlineStr = formatDateTime(new Date(year, month-1, day, hour, minute));
            if (isEditing) {
                const s = schedules.find(i => i.id === isEditing);
                if (s) { s.deadline = deadlineStr; s.completed = true; resetReminderFiredForSchedule(isEditing); }
            } else {
                schedules.push({ id: generateId(), thing, responsible: resp, implementer: impl, deadline: deadlineStr, completed: true });
            }
            saveData(); closeModal(); closePastTimeModal();
        }

        function finalizeSchedule(thing, resp, impl, y, mo, d, h, mi) {
            const deadlineStr = formatDateTime(new Date(y, mo-1, d, h, mi));
            if (editingId) {
                const s = schedules.find(i => i.id === editingId);
                if (s) { s.deadline = deadlineStr; s.thing = thing; s.responsible = resp; s.implementer = impl; s.completed = false; resetReminderFiredForSchedule(editingId); }
            } else {
                schedules.push({ id: generateId(), thing, responsible: resp, implementer: impl, deadline: deadlineStr, completed: false });
            }
            saveData(); closeModal();
        }

        function deleteSchedule(id) {
            if (confirm('确定删除此日程吗？')) { schedules = schedules.filter(i => i.id !== id); resetReminderFiredForSchedule(id); saveData(); }
        }

        function openSettings() { loadSettings(); document.getElementById('settingsModal').style.display = 'flex'; lockScroll(); }
        function confirmSettings() { saveSettings(); document.getElementById('settingsModal').style.display = 'none'; unlockScroll(); }

        window.addEventListener('click', (e) => { if (e.target.classList.contains('modal')) { e.target.style.display = 'none'; unlockScroll(); } });
        document.getElementById('customPersonInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); addCustomPerson(); } });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            newWorker.postMessage({ action: 'skipWaiting' });
                        }
                    });
                });
            }).catch(err => console.log('SW注册失败:', err));
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => { if (!refreshing) { refreshing = true; window.location.reload(); } });
        }

        function init() {
            loadData(); loadReminderFired(); loadSettings();
            if ('Notification' in window && Notification.permission === 'default') { Notification.requestPermission(); }
            renderTable(); setInterval(renderTable, 1000);
        }
        init();
    </script>
</body>
</html>
