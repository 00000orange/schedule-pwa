<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>日程提醒</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2E54A1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Microsoft YaHei', sans-serif; }
        body { background: #f5f5f5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #2E54A1; color: #FFF2BD; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; }
        .header h2 { font-size: 20px; }
        .header button { background: #FFF2BD; border: none; padding: 10px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .current-time { background: #e9ecef; padding: 8px 15px; font-size: 14px; text-align: right; border-bottom: 1px solid #ccc; }
        .table-container { flex: 1; overflow-y: auto; padding: 10px; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; background: white; }
        th { background: #2E54A1; color: #FFF2BD; padding: 10px 6px; position: sticky; top: 0; z-index: 2; white-space: nowrap; }
        td { padding: 8px 5px; border-bottom: 1px solid #ddd; text-align: center; word-break: break-all; }
        .date-separator { background: #D9ECFF; }
        .date-separator td { text-align: left; padding: 8px; }
        .date-text { background: #2E54A1; color: #FFF2BD; padding: 4px 10px; border-radius: 4px; display: inline-block; font-weight: bold; }
        .row-completed { color: #8eb47e; }
        .row-urgent { color: #d04040; }
        .btn-group button { margin: 2px; padding: 4px 8px; font-size: 12px; border: none; border-radius: 4px; background: #e0e0e0; cursor: pointer; }
        .btn-group .btn-danger { background: #ffcccc; }
        /* 模态框 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 420px; max-height: 80vh; overflow-y: auto; }
        .modal-content h3 { margin-bottom: 15px; color: #2E54A1; }
        .modal-content input[type="text"], .modal-content input[type="number"] { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .modal-content .time-row { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
        .modal-content .time-row input { width: 60px; text-align: center; }
        .modal-content .quick-btns { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
        .modal-content .quick-btns button { background: #e0e0e0; color: black; padding: 8px 10px; font-size: 14px; border: none; border-radius: 6px; cursor: pointer; }
        .modal-content .action-btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
        .modal-content .action-btns button { padding: 10px 20px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #2E54A1; color: #FFF2BD; }
        .btn-cancel { background: #ccc; color: #333; }
    </style>
</head>
<body>
    <div class="header">
        <h2>📅 日程提醒</h2>
        <button onclick="openAddModal()">➕ 添加</button>
    </div>
    <div class="current-time" id="currentTime">加载中…</div>
    <div class="table-container" id="tableContainer">
        <table id="scheduleTable">
            <thead>
                <tr><th>事项</th><th>负责人</th><th>落实人</th><th>截止时间</th><th>倒计时</th><th>操作</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <!-- 添加/修改模态框 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3 id="modalTitle">添加日程</h3>
            <input type="text" id="thing" placeholder="事项">
            <input type="text" id="responsible" placeholder="负责人">
            <input type="text" id="implementer" placeholder="落实人">
            <div class="time-row">
                <input type="number" id="year" placeholder="年" min="2024" max="2099">
                <input type="number" id="month" placeholder="月" min="1" max="12">
                <input type="number" id="day" placeholder="日" min="1" max="31">
                <input type="number" id="hour" placeholder="时" min="0" max="23">
                <input type="number" id="minute" placeholder="分" min="0" max="59">
            </div>
            <div class="quick-btns">
                <button onclick="quickAdd(15)">15分钟后</button>
                <button onclick="quickAdd(30)">30分钟后</button>
                <button onclick="quickAdd(60)">1小时后</button>
                <button onclick="quickAdd(180)">3小时后</button>
                <button onclick="setNowTime()">当前时间</button>
            </div>
            <div id="errorMsg" style="color: red; font-size: 13px; min-height: 20px;"></div>
            <div class="action-btns">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-primary" onclick="saveSchedule()">确定</button>
            </div>
        </div>
    </div>

    <!-- 提醒弹窗 -->
    <div class="modal" id="alertModal">
        <div class="modal-content" style="text-align: center;">
            <h3>⏰ 日程提醒</h3>
            <p id="alertMsg" style="margin: 15px 0; font-size: 16px; line-height: 1.6;"></p>
            <div class="action-btns" style="justify-content: center;">
                <button class="btn-primary" onclick="alertComplete()">已完成</button>
                <button class="btn-cancel" onclick="alertPostpone()">延期提醒</button>
            </div>
        </div>
    </div>

    <script>
        // ---------- 数据存储 ----------
        const STORAGE_KEY = 'schedules_data';
        let schedules = [];           // 数组，元素为对象
        let editingId = null;        // 正在编辑的日程ID
        let alertingId = null;       // 正在提醒的日程ID
        let notifiedSet = new Set(); // 已提醒过的ID集合（避免重复弹窗）

        function loadData() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                try {
                    schedules = JSON.parse(raw);
                } catch (e) {
                    schedules = [];
                }
            } else {
                schedules = [];
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(schedules));
        }

        // 生成唯一ID
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        // ---------- 时间工具 ----------
        function getNow() { return new Date(); }

        function formatDateTime(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            const h = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            return `${y}-${m}-${d} ${h}:${min}:00`;
        }

        function getWeekdayCN(dateStr) {
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            const d = new Date(dateStr);
            return '星期' + days[d.getDay()];
        }

        function calcCountdown(deadlineStr, now) {
            const dl = new Date(deadlineStr);
            const diff = dl - now;
            if (diff <= 0) return '计时结束';
            const totalSec = Math.floor(diff / 1000);
            const days = Math.floor(totalSec / 86400);
            const hours = Math.floor((totalSec % 86400) / 3600);
            const mins = Math.floor((totalSec % 3600) / 60);
            const secs = totalSec % 60;
            const parts = [];
            if (days >= 3) { parts.push(`${days}天 ${String(hours).padStart(2,'0')}小时`); }
            else if (days >= 1) { parts.push(`${days}天 ${String(hours).padStart(2,'0')}小时 ${String(mins).padStart(2,'0')}分钟`); }
            else {
                if (hours > 0) parts.push(`${hours}小时`);
                if (mins > 0 || hours > 0) parts.push(`${mins}分钟`);
                parts.push(`${secs}秒`);
            }
            return parts.join(' ');
        }

        // ---------- 渲染表格 ----------
        function renderTable() {
            const now = getNow();
            document.getElementById('currentTime').textContent = `当前时间：${now.toLocaleString()}`;

            // 按截止时间排序
            schedules.sort((a, b) => (a.deadline || '').localeCompare(b.deadline || ''));

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            let lastDate = '';

            for (let i = 0; i < schedules.length; i++) {
                const s = schedules[i];
                const deadline = s.deadline || '';
                const datePart = deadline.slice(0, 10);

                // 日期分隔行
                if (datePart && datePart !== lastDate) {
                    const tr = document.createElement('tr');
                    tr.className = 'date-separator';
                    const d = new Date(datePart);
                    const display = `${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,'0')}月${String(d.getDate()).padStart(2,'0')}日 ${getWeekdayCN(datePart)}`;
                    tr.innerHTML = `<td colspan="6"><span class="date-text">${display}</span></td>`;
                    tbody.appendChild(tr);
                }
                lastDate = datePart;

                // 状态与倒计时
                let status = '', countdown = '', rowClass = '';
                const isCompleted = s.completed || false;
                if (isCompleted) {
                    status = '已完成';
                    countdown = s.completed_countdown || '';
                    rowClass = 'row-completed';
                } else if (deadline) {
                    const dl = new Date(deadline);
                    if (dl <= now) {
                        status = '已完成';
                        countdown = '计时结束';
                        rowClass = 'row-completed';
                        // 检查是否需要提醒
                        if (!notifiedSet.has(s.id)) {
                            notifiedSet.add(s.id);
                            alertingId = s.id;
                            showAlert(s);
                        }
                    } else {
                        const diffHours = (dl - now) / 3600000;
                        status = diffHours <= 2 ? '加油干！' : '进行中';
                        countdown = calcCountdown(deadline, now);
                        rowClass = diffHours <= 2 ? 'row-urgent' : '';
                    }
                }

                const tr = document.createElement('tr');
                tr.className = rowClass;
                tr.innerHTML = `
                    <td>${s.thing || ''}</td>
                    <td>${s.responsible || ''}</td>
                    <td>${s.implementer || ''}</td>
                    <td>${deadline}</td>
                    <td>${countdown}</td>
                    <td>
                        <span style="display:block; margin-bottom:4px;">${status}</span>
                        <div class="btn-group">
                            ${!isCompleted ? `<button onclick="markComplete('${s.id}')">完成</button>` : `<button onclick="markInProgress('${s.id}')">进行中</button>`}
                            <button onclick="openEditModal('${s.id}')">修改</button>
                            <button class="btn-danger" onclick="deleteSchedule('${s.id}')">删除</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            }
        }

        // ---------- 提醒弹窗 ----------
        function showAlert(s) {
            document.getElementById('alertMsg').innerHTML = `
                <strong>事项：</strong>${s.thing}<br>
                <strong>负责人：</strong>${s.responsible}<br>
                <strong>落实人：</strong>${s.implementer}<br>
                <strong>截止时间：</strong>${s.deadline}<br><br>
                ⏰ 时间已到，请确认状态
            `;
            document.getElementById('alertModal').style.display = 'flex';
        }

        function alertComplete() {
            if (alertingId) {
                const s = schedules.find(item => item.id === alertingId);
                if (s) {
                    s.completed = true;
                    notifiedSet.delete(alertingId);
                    saveData();
                }
                document.getElementById('alertModal').style.display = 'none';
                alertingId = null;
            }
        }

        function alertPostpone() {
            if (alertingId) {
                document.getElementById('alertModal').style.display = 'none';
                // 打开修改框延期
                openEditModal(alertingId);
                alertingId = null;
            }
        }

        // ---------- 模态框操作 ----------
        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = '添加日程';
            document.getElementById('thing').value = '';
            document.getElementById('responsible').value = '';
            document.getElementById('implementer').value = '';
            setNowTime();
            document.getElementById('errorMsg').textContent = '';
            document.getElementById('editModal').style.display = 'flex';
        }

        function openEditModal(id) {
            const s = schedules.find(item => item.id === id);
            if (!s) return;
            editingId = id;
            document.getElementById('modalTitle').textContent = '修改截止时间';
            document.getElementById('thing').value = s.thing || '';
            document.getElementById('responsible').value = s.responsible || '';
            document.getElementById('implementer').value = s.implementer || '';
            const dt = new Date(s.deadline);
            document.getElementById('year').value = dt.getFullYear();
            document.getElementById('month').value = String(dt.getMonth() + 1).padStart(2, '0');
            document.getElementById('day').value = String(dt.getDate()).padStart(2, '0');
            document.getElementById('hour').value = String(dt.getHours()).padStart(2, '0');
            document.getElementById('minute').value = String(dt.getMinutes()).padStart(2, '0');
            document.getElementById('errorMsg').textContent = '';
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function setNowTime() {
            const now = getNow();
            document.getElementById('year').value = now.getFullYear();
            document.getElementById('month').value = String(now.getMonth() + 1).padStart(2, '0');
            document.getElementById('day').value = String(now.getDate()).padStart(2, '0');
            document.getElementById('hour').value = String(now.getHours()).padStart(2, '0');
            document.getElementById('minute').value = String(now.getMinutes()).padStart(2, '0');
        }

        function quickAdd(minutes) {
            const y = document.getElementById('year').value;
            const mo = document.getElementById('month').value;
            const d = document.getElementById('day').value;
            const h = document.getElementById('hour').value;
            const mi = document.getElementById('minute').value;
            const dt = new Date(y, mo-1, d, h, mi);
            dt.setMinutes(dt.getMinutes() + minutes);
            document.getElementById('year').value = dt.getFullYear();
            document.getElementById('month').value = String(dt.getMonth() + 1).padStart(2, '0');
            document.getElementById('day').value = String(dt.getDate()).padStart(2, '0');
            document.getElementById('hour').value = String(dt.getHours()).padStart(2, '0');
            document.getElementById('minute').value = String(dt.getMinutes()).padStart(2, '0');
        }

        // ---------- 数据操作 ----------
        function saveSchedule() {
            const thing = document.getElementById('thing').value.trim();
            const resp = document.getElementById('responsible').value.trim();
            const impl = document.getElementById('implementer').value.trim();
            const y = parseInt(document.getElementById('year').value);
            const mo = parseInt(document.getElementById('month').value);
            const d = parseInt(document.getElementById('day').value);
            const h = parseInt(document.getElementById('hour').value);
            const mi = parseInt(document.getElementById('minute').value);

            if (!thing) { document.getElementById('errorMsg').textContent = '事项不能为空'; return; }
            if (isNaN(y) || isNaN(mo) || isNaN(d) || isNaN(h) || isNaN(mi)) {
                document.getElementById('errorMsg').textContent = '日期时间必须填完整'; return;
            }
            const deadlineDate = new Date(y, mo-1, d, h, mi);
            if (deadlineDate <= getNow()) {
                document.getElementById('errorMsg').textContent = '截止时间不能早于当前时间'; return;
            }
            const deadlineStr = formatDateTime(deadlineDate);

            if (editingId) {
                const s = schedules.find(item => item.id === editingId);
                if (s) {
                    s.deadline = deadlineStr;
                    s.completed = false;
                    notifiedSet.delete(editingId); // 允许再次提醒
                }
            } else {
                const newSchedule = {
                    id: generateId(),
                    thing,
                    responsible: resp,
                    implementer: impl,
                    deadline: deadlineStr,
                    completed: false
                };
                schedules.push(newSchedule);
            }
            saveData();
            closeModal();
        }

        function markComplete(id) {
            const s = schedules.find(item => item.id === id);
            if (s) {
                s.completed = true;
                notifiedSet.delete(id);
                saveData();
            }
        }

        function markInProgress(id) {
            const s = schedules.find(item => item.id === id);
            if (s) {
                s.completed = false;
                notifiedSet.delete(id);
                saveData();
            }
        }

        function deleteSchedule(id) {
            if (confirm('确定删除此日程吗？')) {
                schedules = schedules.filter(item => item.id !== id);
                notifiedSet.delete(id);
                saveData();
            }
        }

        // ---------- 初始化 ----------
        loadData();
        renderTable();
        setInterval(renderTable, 1000);

        // 关闭所有模态框（点击空白处关闭）
        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                event.target.style.display = 'none';
            }
        };

        // 如果之前有已提醒的ID，加载到集合中（但这里我们只记录本次会话）
        // 每次页面刷新，已提醒集合清空，这样再次打开页面时如果还有过期日程会再次提醒
        // 这符合预期

        // 请求通知权限（可选）
        if ('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
            Notification.requestPermission();
        }
    </script>
</body>
</html>
